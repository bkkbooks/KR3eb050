body:
  text: 卷下目分臟腑部位凡觀氣色當視精明精明者目也五臟六腑之精也營衛魂魄之所常營神氣之所生也心之使也肝之官也宗脈之所聚也陰陽之所會也氣之清明者也靈樞曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中夫筋骨血氣肌肉者五臟之所屬也是故以眼分五臟血絡屬心黑珠屬肝白珠屬肺瞳子屬腎約束屬脾赤脈從上下者太陽病從下上者陽明病從外走內者少陽病從內眥始者陽蹺病瞳子黑眼法於陰白眼赤脈法於陽陰陽合傳而精明也此臟腑之部陰陽之分也由是而觀有形焉有容焉有氣焉有色焉分而論之所以明其理合而診之所以通其變形也容也氣也色也無往而非臟腑之徵亦無往而非陰陽之理也臟腑陰陽形容氣色有諸中形諸外要皆以神為本也寤則神棲於目寐則神處於心神也者視瞻平正黑白分明容色精爽光彩清瑩朗朗然不可須臾離也神之昭著於目者蓋如此至若目之五輪睛之八廓名雖附於羲黃實則乖夫體用殊不知眼科診目之法當遵聖人診目之法若附會聖人之法以立法則附會聖人之法即非法然則求眼科之法者其知所以法乎眼目形容提綱診目形容之法相士觀人賢否宜識其常醫家論病吉凶當明其變用是考古參今刪繁就簡約而言之其大綱有四以形象察氣質以開闔分陰陽以目瞼辨虛實以眼珠決死生四者既明而合之氣色參之病情庶乎其可見矣以形象言之目者肝之外候也目大者肝大目小者肝小目深者肝堅目露者肝脆目高者肝高目下者肝下目偏傾者肝偏傾目端正者肝端正此形象之變氣質之常也以開闔言之瞋目者陽證也瞑目者陰證也目不合者氣留於陽目不開者氣留於陰目綱筋急而不合者太陽陽明之筋寒目綱筋縱而不開者太陽陽明之筋熱目圓者陽氣絕目小者陰氣亡口眼喎斜者陽明中風口目動作者陽明將絕昏睡露睛者陰陽俱不足也此開闔之變陰陽之分也以目瞼言之上瞼屬脾下瞼屬胃瞼動遲者脾動遲瞼動速者脾動速上瞼氣壅者脾衰於內下瞼微腫者水聚於中目胞腫痛者邪氣實目眶陷下者正氣虛此目瞼之變虛實之辨也以眼珠言之目腫脹者為實目陷下者為虛上視者太陽不足下視者宗氣虧虛斜視者少陽已絕直視者少陰已終目轉目運者陰經之絕證目睘戴眼者陽經之死候也此眼珠之變死生之異也蓋察目之形容者所以辨其臟腑經絡也觀目之氣色者所以辨其寒熱虛實也合形容氣色以觀之參聲音脈症以辨之分其臟腑經絡以審其寒熱虛實庶乎知病之所而無泛治之虞不則寒熱虛實雖明而臟腑經絡未達其猶風馬牛不相及歟眼目氣色提綱凡診眼目既察形容當觀氣色夫目者心之符肝之竅五臟六腑之精氣也華色者其榮也論疾診尺篇曰目赤色病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中此以目色分五臟也由是而觀有明暗之辨焉有清濁之分焉有淺深之異焉明則神氣充足暗則神氣虧虛清者病在陽濁者病在陰淺深者言乎其虛實也合而論之則深而清明者為太過淺而濁暗者為不及太過者病在外不及者病在內察其氣色而言臟腑察其臟腑而言病症明暗者言其光彩清濁者論其氣色氣色淡者謂之淺氣色濃者謂之深也以寒熱言之黃赤者多熱氣青白者少熱氣以證候言之黃赤為風青黑為痛白為寒其聲色臭味情志變動與夫部位之生克色病之從違皆可以面部相應之法比例而推也然面目相應者固可同斷面目不應者亦可合觀蓋應者其常不應者其變知其所以變則知其所以病矣經曰精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼由此觀之則目色之欲清明不欲濁暗益可見矣夫清明者神之著靈動者神之用得神則生失神則死神也者心之精爽也左傳云心之精爽是謂魂魄魂魄去之何以能久其是之謂乎地蒼朝鮮本作地炭見東醫寶鑑瞼色望法提綱既述瞼之形容當觀瞼之氣色夫瞼者眼弦也上為陽下為陰左為陽右為陰小眥在外為陽大眥在內為陰察其色之所見以言其病之所在脾胃之候也脈經云脾之候在瞼以氣色言之青屬木赤屬火黃屬土白屬金黑屬水此臟腑五行之分也察其澤夭以知成敗察其浮沉以知淺深察其清濁以知陰陽察其微甚以知虛實察其散摶以知遠近浮清為外沉濁為內視氣色而言臟腑審臟腑而言病症參之以五色相應之理其常變可推也參之以五行生剋之理其順逆可推也合氣色部位而參之其相乘之理又可推也黃赤為風青黑為痛白為寒皆可比例以相參也析而觀之合而斷之變化無窮矣聖人之法所操者約所及者廣五官氣色皆當作如是觀也然經言五色決於明堂又當參伍以通其變焉合四診而察之庶乎其可矣面目望法相參察目之法形色既可參觀面目亦當合論經曰凡相五色之奇脈面黃目赤面黃目青面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白者皆死也蓋不死者以其有黃色也死者以其面無黃色目亦無黃色也夫黃者土色也猶脈之胃氣也故凡病人準頭印堂年壽及目瞼有黃氣明潤者皆為欲愈之候扁鵲華佗察聲色秘訣云病人面目俱等者不死病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黑者不死黑如炲死病人面黑目青者不死病人面青目白者死病人面黑目白者不死病人面白目黑者死病人面青目黃者五日死病人面赤目青者六日死病人面黑目白者八日死病人面黃目青者九日死病人面赤目白者十日死此皆相參之法也詳求扁鵲華佗所謂生死者面目以貴明潤而忌枯槁也其與內經有異同者當以是貫通之秘訣面目之色傳寫多誤今從宋元校正王氏脈經眼目形容條目凡察目之形容前已述其提綱今當集其條目如開目喜見人者屬陽閉目不欲見人者屬陰瞋目者陽氣盛瞑目者陰氣衰目瞑不得臥者衛氣留於陽不得入於陰目閉不得視者衛氣留於陰不得行於陽陽病瞋目而動者輕陰病閉目而靜者重閉目而渴心下牢者脈當得緊實而數而反得沉濡而微者死也閉目不欲見人者脈當得弦急而長而反得浮澀而短者死也目瞑耳聾上虛下實者過在足少陽厥陰也強上瞑視唾出若涕惡風而振寒者勞風也目不合卒口僻者足陽明之筋急也目不開卒口僻者足陽明之筋縱也翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣者脾中風也眼皮垂下而不能展上者因於風濕將有半身不遂之患也眼畏光不能開者眼內發熱也中風閤眼鼻鼾者不治之證也目閉而青時小驚者癇候也太陽病脈浮緊無汗發熱身疼痛八九日不解發煩目瞑劇者必衄衄乃解也視而時瞑非開目者衄之常候也脈浮大上關上但欲眠睡目合則汗者三陽合病也脈微細但欲寐者少陰病也熱病身重骨痛耳聾而好瞑者病在骨也目不合者目氣不營陰蹺病也目瞑直視毛焦面黑者陰氣絕也目澀欲睡者肝絕也厥不知人目合爪甲青者肝絕也目正圓者痙病之死證也目正圓手撒戴眼者太陽絕也病癰疽眼小白珠青黑者逆證也昏睡露睛者脾胃虛極也口眼喎斜者風中經絡也瞼澀嗜臥者脾病也瞼浮腫者脾虛不健運也上瞼腫者脾氣熱也目下腫者水在腹也目下有臥蠶面目鮮澤脈伏消渴者病水也目窠下微腫如新臥起之狀頸脈動時咳者風水也面目腫大有熱者風水也諸有水者微腫先見於目下也眼胞腫十指頭微腫者久咳也眼胞忽陷者五臟絕也目眶陷者陰陽竭絕也目眶陷視不見人真臟脈見頃刻而死若能見人者至所不勝之日時而死也眼眶爛者風也嬰兒目胞邊赤爛痛癢難睜者胎中蘊熱生後上攻也眥瘍者燥火流行而目病也目赤腫痛者歲火盛行而目病也目生翳膜胬肉者外障也黑珠脹起者肝氣鬱滯也疳病白膜遮睛或瀉血黃瘦者肝疳也目腫腹脹瀉利青白者疳在內也眼珠脫出或不動或脫落者風毒也癘風目先損者病在心也目如脫喘咳上氣者肺脹也目如脫狀虛而滿喘咳逆倚息其脈浮大者亦肺脹之證也吐瀉目陷瞼青者土敗木賊也目內陷者死證也先不樂頭重痛視舉目赤煩心者癲疾始生也目不明上視喜陽者癇證也喜反目上視者亦癇證也目反四肢不舉者膈癇也上視者太陽不足也戴眼瘛瘲色白絕汗出者太陽終也戴眼足不可屈伸者足太陽氣絕也頭傾視深者精神將奪也平人忽然眼垂下視者壽不永也視下言徐者無守氣也目眶陷目系傾汗出如珠者陽絕也病人目系傾者七日死也身熱目時直視或視不精者癇候也瞳子卒大黑如常者亦癇候也目正直視腹大者牛癇也病肺瘧其人語聲本雄烈忽爾不亮拖氣用力方得出言呼與語直視不應者此肺病聲音之候勢不久也目精脫恍惚者陰結陽絕之死證也熱病瞳子青小爪枯發墮身澀齒挺而垢面厚塵黑咳而吐血渴欲數飲且大滿者五臟絕也息肩回視目亭亭者二日死也直視不回息肩者一日死也兩目回回直視息肩者心絕一日死也息肩回視心絕者立死也直視搖頭者心絕也陽反獨留形體如煙燻直視搖頭者心絕也狂言目反直視溲便遺失者腎絕也直視譫語喘滿者死下利者亦死也目多直視視不轉睛者五臟俱絕也睛定不轉者神亡之候也傷寒吐下後不解不大便五六日至十餘日日晡所發潮熱惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者有燥屎也額上陷脈緊急汗出直視不能眴不得眠者衄家亡血復發汗陰陽俱虛也目眩轉者邪入於腦目系急也目矇眩轉者三陰絕志先死也目運者目系轉志先死五陰氣俱絕也口目動作善驚妄言色黃其上下經盛不仁者陽明終也耳聾百節皆縱目睘系絕者少陽終也瞳子高者太陽不足戴眼者太陽已絕此決死生之要也至若悲哀動中而泣出者五臟皆搖也泣出不止者液道開也見風泣下者風中目也瘦人泣出者風中陽明也喘咳寒熱背痛腰疼目泣自出者膈上痰滿也目赤熱痛者流淚則輕成膿則重也目視而不見人泣出如水不止者肝絕也初生赤子泣而無淚者死證也若夫瞳仁處暗則大處明則小者是隔簾舒縮之常非疾病之變也其或處暗不大處明不小則精神亦病焉可比例交參也此眥目之形容也眼目氣色條目既述目色之提綱當集目色之條目謹按金匱要略云目色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲此固目色之要略也然析而論之又各不同如白珠色赤者風也目赤從內眥始者陰陽二蹺之病也目色淡紅者虛熱也傷寒厥逆目脈赤睛不慧者熱多厥少也面赤目脈赤獨頭搖卒口噤背反張者痙也少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下則悸而驚也病者脈數無熱汗出微煩默默但欲臥初得之三四日目赤如鳩眼七八日四眥黑若能食者內癰之膿已成也眼如醉眼而含淚發熱腮赤指梢冷者痘疹也傷寒目眥紅者將發疹瘍之兆也疳病上攻於眼時癢赤爛眼胞腫疼白睛起膜大時流淚閉目羞明者眼疳也白珠色鮮明者有留飲也眼白失色者膽蒸也目色及目眥胬肉爪甲俱白者血虧也目下有臥蠶面目鮮澤脈伏者病水而消渴也面赤目白者憂恚思慮心氣內索也面黑目白者腎氣內傷病因留積也肝先病目則為之無色肝前死目則為之脫精者神氣先衰也白珠色青者痛也面目青身痛如被杖咽喉痛者陰毒也面黃目青者風入胃膽氣泄也面目爪甲皆青眼生眵淚搖頭揉目眼澀難睜腹大筋青羸瘦煩渴糞青如苔者肝疳也白珠色黃者小便難也面赤目黃者心主所生病也目黃善笑者心所生病也肥人目黃者風熱在陽明也傷寒發汗已身目為黃者寒濕在裡不解也尺脈浮目睛暈黃者衄未止也目暈黃去而慧了者知衄今止也外感目色若赤若黃者邪已傳裡也白睛淡黃者脾虛泄利也目黃如金者將發黃也目黃且濁如煙燻者黃疸濕甚也目老黃色者濕熱也黃如橘明者黃疸濕熱也面黃目黃溺黃齒垢黃爪甲上黃者黃疸也目黃白目胞腫者谷疸也目淡黃色者積聚也目黃青紫脈芤者瘀血在胸中也婦人眉低眼皺目色微黃其脈陰搏陽別者妊子也病人目黃而大煩脈不和者其病為進以其邪勝也黑珠純是黃色者凶證也白珠色黑者勞也五勞虛極羸瘦腹滿不能飲食肌膚甲錯兩目黯黑者內有乾血也目黑頰赤者痰也目黑麵黃者四肢痿痹也面白目黑者榮華已去血脈空索也瞳子內不見黑瑩或紅紫或青白者血貫瞳仁目病而人不久也瞳仁變綠者綠水灌瞳仁難治之症也瞳黃唇白面紅中有青點者中風之先兆也瞳仁或微黃或淡白者腎虛也瞳仁或散大或集小者皆腎虛也瞳仁散大左右不均者中風極險之證也病者瞳仁漸散漸大不能舒縮視一物見兩形手足搖顫面色青白身出冷汗二便遺泄不省人事者死證也瞳仁無光彩發黃者腎氣不足也晚視不見瞳子如金色者名曰黃風不治之證也瞳仁黑減或停滯不活者目將壞也目無精光牙齒黑者瘰癧不治之候也目無精華者腎精枯涸也羸瘦氣少無力身無膏澤眼無精光立不能定身體苦癢者精極也眼目青盲者精不灌目也目無神者壽促之徵也目無光者命絕之候也目光晦暗者此為神短病死之候也目光清瑩了了分明者此為神足不病之候也若夫寒熱瘰癧反其目視之中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死其赤脈不下貫瞳子者可治也此皆目之氣色也望舌診法提綱蓋聞道原於天而具於心心者生之本形之君至虛至靈具眾理而應萬事者也其竅開於舌其經通於舌舌者心之外候也是以望舌而可測其臟腑經絡寒熱虛實也約而言之大綱有五一曰形容二曰氣色三曰苔垢四曰津液五曰部位五者分論則其體明五者合觀則其用達矣由是察其形容舌常有刺也無刺者氣衰也刺大刺多者邪氣實刺微刺少者正氣虛舌常無紋也有紋者血衰也紋少紋淺者衰之微紋多紋深者衰之甚舌腫者病在血舌痿者病在肉舌偏斜者病在經舌缺陷者病在臟舌戰動者病在脾舌縱舌縮者病在心舌裂舌爛者病在脈舌捲舌短者心肝之證候舌強舌硬者心脾之病形弄舌者太陰之形症齧舌者少陰之氣逆諸太過者病在外諸不及者病在內此皆形容之目也由是觀其氣色舌赤者心之正色也深赤者為太過淡紅者為不及深而紫者血分熱淡而白者氣分寒深青者瘀血疼痛淡黑者氣血虛寒深赤而黑者熱極淡白而青者寒深諸色淺者正虛諸色深者邪實明潤而有血色者生枯暗而無血色者死此皆氣色之目也由是視其苔垢舌常有苔也無苔者虛也苔垢薄者形氣不足苔垢厚者病氣有餘白苔者病在表黃苔者病在裡灰黑苔者病在少陰苔色由白而黃由黃而黑者病日進苔色由黑而黃由黃而白者病日退此皆苔垢之目也由是審其津液滋潤者其常滑澀者其變滑為寒寒有上下內外之辨澀為熱熱有表裡虛實之分此皆津液之目也由是分其部位手少陰通舌本足少陰挾舌本足厥陰絡舌本足太陰連舌本散舌下舌本在下舌尖在上舌中為內舌邊為外左病者應在左右病者應在右而凡形容之變氣色之殊與夫苔垢之分津液之辨皆可以是推之此部位之目也夫然後舉夫五者之大綱以參究五者之細目以合觀化而裁之推而行之其理無窮其用不盡矣雖然五者之用固在通變而五者之變又在求神神也者靈動精爽紅活鮮明得之則生失之則死變化不可離斯須不可去者也是又五法之本也他如諸書之條目選錄於後篇學者合五法而察之參四診而治之庶乎其不悖矣診舌形容條目凡察舌之形容前已述其提綱今當集其條目蓋舌者心之苗心者身之主故觀舌之形可診身之病也舌有形容可分臟腑色有淺深可辨虛實然臟腑之病症皆有虛實之分則形容之氣色當有淺深之辨諸書謂滿舌黑苔而生大刺乾燥底紅者實熱也舌生芒刺者結熱甚也舌上無刺而津潤者中寒也舌赤而脹大滿口者少陰陽明之熱也舌下腫出如舌者重舌也舌忽腫而木硬者木舌也舌腫滿口溢出如豬胞氣息不得通或硬如木石者血壅氣滯也舌赤而有重舌者熱入心胞也舌赤腫滿不得息者手少陰熱甚而血壅也舌腫大者或因熱毒或因藥毒也舌紫且腫厚者酒毒上壅也耳干舌腫下血不止腳浮者六日死足腫者九日死腎絕也耳干舌腫溺血大便赤泄足腫者肉絕九日死胃絕五日死也舌赤而出血如衄者熱傷心胞也聲亂咽嘶舌痿聲不得前者厥而脈緊誤發其汗也咳止利不休胸如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁穀氣多入口雖欲言舌不得前者除中也舌紅而痿軟難言者心脾虛也心清語澀舌軟無力難言者營衛不足也腹滿舌痿黃燥不得睡者屬黃家言其發黃也舌紅而乾癟不能言者死證也舌紅而乾癟能言者因症治之或可救也病人身寒口吐涎沫舌即難言者邪入於臟也舌無苔而黑瘦者津枯血燥也舌痿人中滿唇反者足太陰氣絕肉先死也面目相引口偏著耳牙車急舌不得轉者風中血脈也舌偏語澀口眼喎斜手足不遂者偏風也舌偏斜者左癱舌向左右癱舌向右也舌形沿邊缺陷如鋸齒者臟氣虛憊不治之症也熱病舌難伸出伸則頻振語言不清者正氣虛弱之險症也舌縱涎下煩悗者足少陰之證也癇病喜揚目吐舌者羊癇也舌出不能收及不能語者心絕也吐舌伸長而收緩面紅煩躁口渴溺赤者心經有熱也發熱口噤臨死舌出數寸者女勞復陽氣虛也陰陽易舌出數寸者死證也舌出數寸者產後與中毒大驚之候也小兒病舌出不能收者心氣散也舌本縮口噤唇青者小腸腑寒也言聲憂懼舌本捲縮者木剋土也舌形灰色漸干縮者死證也舌捲縮如丹嚥唾不得足踝小腫者肉絕也熱病舌赤碎爛如蠶蝕者少陰證也舌赤裂而生瘡者手少陰之邪熱也舌上生瘡裂破引唇揭赤者心臟熱也口舌生瘡糜爛者心脾二經之蘊熱也口舌生瘡咽腫者膀胱之熱未已也口舌生瘡者上焦之熱也舌黑而中爛者不治之證也熱病舌本爛熱不已者死證也顴赤舌卷短者心病也舌卷而煩滿囊縮者厥陰病也喉痹舌卷口乾煩心心痛臂內廉痛不可及頭者邪客於手少陽之絡也舌卷不能言者手少陰之經病也語聲憂懼舌本捲縮嗔喜無度惛悶恍惚脹滿者脾寒受風也唇青舌卷卵上縮者足厥陰氣絕筋先死也中熱嗌乾善溺心煩甚則舌卷卵上縮者厥陰終也汗出不流舌卷黑者心絕也吐舌下卷者死證也霍亂舌卷筋縮卵陰入腹者難治也腰痛引膺目䀮䀮然甚則反折不能言者昌陽之脈令人腰痛也熱病舌乾黑而短者厥陰熱極也舌本強食則嘔者足太陰之病也舌強難言神氣不清者中風之證也舌強不能言者手少陰病也奄忽不知人喉中噫噫然有聲舌強不能言發其汗身轉軟者生汗不出身直者七日死風懿之候也小兒撮口臍風舌強直者死證也咽嗌不能言邪結在舌根者死證也膈偏枯男子發左女子發右不喑舌轉者可治也舌紅而戰動難言者心脾虛也失音不能言者二日半死陰陽俱絕也舌木硬者厥陰病也舌紅而強硬失音者死候也弄舌搖頭者癇候也舌在口中時時搖動唇焦舌乾煩熱便穢者名曰弄舌心脾熱也小兒面黃肌瘦弄舌者疳也弄舌者脾臟虛熱也舌黑爛而頻欲齧者必爛至根而死也齧舌者厥氣逆走上少陰之脈氣輩至也舌色灰黑時時自欲齧舌者少陰氣逆之死證也此皆診法之條目論舌之形容也診舌氣色條目診舌之法既講形容之條目當集氣色之條目夫舌者心之官色者心之華心生血而屬火色赤而主舌是赤者舌之正色也故察舌色之變可知病症之殊也舌有赤白青黑之色可分臟腑寒熱色有淺深明暗之辨可判虛實死生推而論之如赤為熱赤之淺者虛熱也赤之深者實熱也青為寒青之淺者虛寒也青之深者實寒也明潤而或赤或青則生枯暗而或赤或青則死明潤之深者雖病重而可生枯暗之淺者雖病輕而當死合之形容亦可知其臟腑也諸書謂舌紅紫者熱也舌淡白者虛也舌赤而鮮豔者病在血分也舌中見紅赤點目色黃頭汗小便不利者將發黃也舌見紫斑身體疼痛惡寒發熱腮赤者將發斑也舌上赤裂大渴引飲者上消之證也三消病熱甚飲多舌紫乾者病久則發癰疽而死也舌赤起紫泡者手少陰之熱證也舌純紅露黑紋數條而苔滑者水乘火位寒證也舌淡紅中見紫黑筋數道者厥陰之寒證也舌灰黑無苔脈沉遲者直中三陰也舌無苔垢而色變者虛也舌白無苔而明淡外證熱者胃虛也舌白唇白者或流血過多或脾有病也舌白唾血者脾蒸也舌上青黑無刺而津潤者中寒也舌無苔而冷滑者少陰之寒證也舌黑少神而潤滑者虛寒也舌黑無苔而燥者津液受傷虛陽上越也熱病口乾舌黑者死證也舌變棕黑色者熱病將死也熱病七八日其脈微細小便不利暴加口燥脈代舌焦乾黑者死證也唇舌紫黯青腫者中毒也舌見純紫色者酒毒也唇青舌黑如豬腰者九死一生也舌上無苔如去油腰子者亡津液不治之證也疳病耳邊有青脈舌上有焦點者不治也疳渴飲水不止舌黑者死證也舌腫黑者心火極也舌見藍色者微可治深必死肺氣傷也妊娠面舌俱帶白者寒證也妊娠舌色太赤者熱入血分恐胎墮也產婦面舌俱赤者母子俱生也產婦面舌俱青口中沫出者母子俱死也產婦面赤舌青者母活子死也產婦面青舌赤口中沫出者母死子活也產婦面舌俱白證逆色夭者血氣俱虛亦死證也產後舌紫黑者血先死也病人胸滿唇痿舌青口燥漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿者有瘀血也若夫跌僕而舌青黑者瘀血內蓄也痘疹而舌青黑者疫氣內陷也癰疽而舌青黑者毒氣內攻也中寒而舌青黑者邪氣入臟也發斑而舌青黑者胃爛也痢疾而舌青黑者胃腐也赤子初生時舌如豬肝者死證也舌純黑者無不死也此皆舌色之條目也辨其色之明潤枯暗可判其病之順逆吉凶也診舌苔垢條目既述舌色之條目當集舌苔之條目夫苔因病生病以苔著察色而不觀苔究難辨其虛實觀苔而不察色安能測其盛衰且三因百病莫不有苔則亦莫不可驗豈特傷寒而已哉然稽諸古昔惟傷寒家言之以為傷寒舌上有苔者必自潤而燥自滑而澀由白而黃由黃而黑甚至焦乾或生芒刺此邪氣傳裡由淺入深之證也如舌有白沫白涎頭項強痛者太陽病也白屑滿舌身熱目痛鼻乾不得臥者陽明病也舌苔白滑胸脅痛而耳聾或寒熱往來口苦咽乾目眩者少陽病也舌上白苔脅下硬滿不大便而嘔者陽明病柴胡證也白苔乾厚惡寒體痛者表未解也濕家下早則噦或胸滿小便不利舌上如苔者以丹田有熱胸上有寒渴欲得水而不能飲則口燥煩也心中懊憹舌上苔者邪客胸中也舌上白苔煩躁脈數實六七日不大便者其後必便膿血也舌苔白而濕濕而厚者身發小熱也如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治也臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也苔白而黃者邪將傳裡也舌苔中黑邊白而滑惡寒脈微弱者表裡虛寒也舌苔中見灰黑色兩條症見三陰者邪傳入里也兩感一二日舌苔中黑邊白者不治之症也苔白而舌根俱黑汗後脈躁者死證也舌苔初微黃次深黃甚則焦黃身熱汗自出不惡寒反惡熱者陽明病胃家實也舌上黃苔雙垂夾見手足濈然汗出潮熱譫語者正陽陽明也苔黃燥不大便而潮熱譫語手足濈然汗出者胃腑實熱也病者腹滿按之而痛舌黃未下者下之黃自去也苔黃而滑目黃頭汗出劑頸而還小便不利者身必發黃也苔黃舌中有斑體疼發熱腮赤者身已發斑也苔如薑黃色及松花色津潤而冷或腹痛吐利者陽衰土敗也苔黃中有小黑點腹滿嗌乾者邪傳太陰也黑暈兩條而中灰色口燥舌乾者邪傳少陰也苔黑舌乾而短煩滿囊縮者邪傳厥陰也舌中苔黑而乾者邪傳少陰熱甚津枯也苔如黑軟潤而滑者水剋火寒症也苔黃黑症見不足者元氣大虧也舌心焦黑質地紅活不大便而潮熱譫語手足濈然汗出者邪並於胃即可下也舌根起黑苔咽不結者可治也舌根起黑苔咽結者不可治也舌根起黑苔瓣底黑者必死不治也兩感一二日舌見黑苔者死證也黑色連地而灰黯無神者敗證也妊娠病熱苔黃而焦胃家實者瀉其實所以安其胎也此集傷寒之論苔者宜合病症而察之也其他舌苔乾澀如雪者脾熱也舌苔黃黑小腹脹痛小便自利者有瘀血也小兒初出腹舌上有白屑如米劇者口鼻亦有之此由胞胎中受穀氣盛所謂鵝口者也是皆舌苔之條目也愚謂舌色深赤者邪氣實舌色淡紅者正氣虛舌深赤苔薄而滑者正勝邪舌淡紅苔厚而澀者邪勝正舌深赤而明潤苔厚而燥澀者形氣病氣俱有餘舌淡紅而枯暗苔薄而冷滑者形氣病氣俱不足也顧前人獨言其苔後學當察其色參之五法合之四診則凡黃白灰黑之苔莫不有寒熱虛實之辨即雜病亦有可驗者非特傷寒而已也金剛經云如來常說汝等比邱知我說法如筏喻者法尚應舍何況非法然則學斯法者取其精華去其糟粕胸中有一定法無一成法庶幾其有法歟診舌津液條目既集舌苔之條目當集津液之條目夫腎主津液內溉臟腑經系舌本外應病症故察津液之多少可知腎氣之盛衰察津之滑澀可知病氣之寒熱由是而言有因外寒而滑者有因內寒而滑者有因虛熱而澀者有因實熱而澀者諸書謂舌上白苔而膩滑咳逆短氣者痰飲也咳而口中有津液舌上苔滑者肺寒也脈陰陽俱緊口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七八日來其人微發熱手足溫者此為欲解到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也舌上無苔而冷滑脈微惡寒身蜷而臥者少陰中寒也臟結舌上白苔滑者難治也兩臂不舉舌本燥善太息胸中痛不得轉側食則吐而汗出者肝中寒也舌無苔而乾燥者腎臟不足津液虛竭也舌苔中心黑厚而乾者謂之焙舌邪傳少陰熱甚津枯也惡寒發熱而津液如常者邪在太陽之表也白苔乾厚無汗惡寒身疼痛者表未解也熱病五六日口燥舌乾而渴者少陰病也舌乾咽腫上氣嗌乾及痛煩心心痛者病在足少陰也嗌乾口渴苔不滑而澀者邪傳厥陰也津液乾燥舌上苔者表邪傳裡也舌焦唇槁臘干嗌燥者腠理閉汗不出也傷寒吐下後七八日不解時時惡風大渴舌上乾燥而煩欲飲水數升者熱結在裡表裡俱熱也渴欲飲水口乾舌燥者熱在裡而耗其津液也黑刺破裂而乾燥者熱甚而津涸也舌灰黑中有干刺咽乾口燥者熱結在少陰也滿舌黑苔而生大刺乾燥底紅者實則可下之證也傷寒十一日舌乾已而嚏者少陰病衰也下痢舌黃燥而不渴胸中實下不止者死證也腹滿口乾舌燥者腸間有水氣也舌中黑無苔而燥者津液受傷虛火用事也此集諸書之言津液者愚謂舌色淡紅苔薄而滑者內寒也舌色深赤苔厚而滑者外寒也苔薄而澀舌淡紅者虛熱也苔厚而澀舌深赤者實熱也然正虛者邪氣有有無之辨邪實者正氣有盛衰之分宜合之五法參之四時庶不至虛虛實實損不足而益有餘矣第察舌之時病人宜診而後食則苔之厚薄易分診而後飲則苔之滑澀易辨至於乾黑之舌又當以蜜拭苔垢然後視其形色紅赤者可治青黑者不可治亦望舌之所宜知也若夫部位之分或因形色或因苔垢或因津液可以類推故不復集診口形容提綱聞之舌以舒捲為用口以開闔為用各一其陰陽也且口者脾之竅心之外戶也難經七衝門謂唇為飛門齒為戶門以其開闔運動聲音從口出飲食從口入四通五達為臟腑之衝要也察之之法蓋有十焉曰張曰噤曰撮曰僻曰振曰動曰頦落曰口齧由是分其燥濕辨其寒熱其為病亦可見矣何言之張則開而不閉噤則閉而難開撮則上下有蹙聚之形僻則左右有緩急之狀振者寒慄鼓頷急急搖振動者開闔其口頻頻運動頦落者似張而頦不能闔口齧者似動而齧不頻開燥由津液之干濕屬唾涎之滑是故張主虛噤主實撮為邪正交爭正氣衰而邪氣勝僻是經筋相引急為正而緩為邪振乃陽明之虛動緣胃氣之絕頦落者頰車不收病在陽明之脈口齧者腎臟將敗病達胃腑之經是皆口之形容也然形容雖有燥濕之分燥濕亦有虛實之辨故燥雖屬熱濕雖屬寒而上下表里不同臟腑陰陽亦異苟不合之四診參之五官則知其燥而不知其所以燥知其濕而不知其所以濕將治熱而熱不除療寒而寒不退其不倒行逆施也者幾希若夫口之五色著於唇口之五味詳於問又當參伍相證焉庶乎體益明而用益達矣他如浸淫瘡從口流向四肢者可治從四肢流來入口者不可治推而論之即痘瘡廣瘡及諸痛瘡瘍其順逆亦猶是也診口形容條目既識口之提綱當知口之條目如書云目瞪口開兩手舒展若驚怖之狀者大驚卒恐氣血分離也呼吸張口短氣者肺痿吐沫也癇病張口搖頭馬鳴欲反折者馬癇也肉熱口開舌破咽塞聲嘶者心臟實為陽毒所侵也口張生瘡者小腸傷熱也發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口前開板齒燥者太陽中暍也脫肉又臥口欲得張時時手足青目瞑瞳仁痛者此為肝臟受傷所致也肺病言音喘急短氣好唾熱而狂閉目悸言非常所說口赤而張飲無時度者熱傷肺火剋金不治若面赤鼻不欹可治也中風口開者心絕也痙病目瞪口開神昏不知人者死證也病人口張者三日死也鼻口虛張短氣者肺絕也口張但氣出不返者肺絕三日死也病人口張開者心先病也病人脈絕口張足腫者五日死也口如魚口不能復閉氣出多不返者死證也口如魚口不能合者脾絕也目瞪口呆勢危者必絕也神脫口開天柱傾欹者死證也口噤難言者風痙也言遲者風也牙關緊急口闔不得開者風寒中於陽明也太陽病無汗而小便反少氣上衝胸口噤不得語者欲作剛痙也胸滿口噤臥不著席腳攣急必齘齒者痙之為病也產後發疾口噤倒悶吐沫瘛瘲眩冒不知人者卒中風也口不能言者肝風之候也卒不能語口噤手足不遂而強直者風痱也煩悶無知口沫出四體角弓目反上口噤不得言者風眩發大人癲小兒癇其實一也神昏卒倒口噤不語者中惡屍疰之候也傷寒五六日以上不解口噤不能語惟欲飲水者熱在胸中為壞傷寒也諸乘寒鬱冒不仁口急不能言戰而慄者胃無穀氣脾澀不通也煩疼口難言者榮氣不足也病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者病邪必欲解也妊婦項背強直筋脈攣急口噤語澀昏迷發搐時作時止者子癇也小兒初生面青身冷口噤者胎寒也臍風口噤舌大痰壅者不可治也面青口撮者疼痛也小兒初生唇口撮多啼不能吮乳者臍風也小兒初出腹面目繞鼻口悉黃閉目聚口撮面而啼口中乾燥四肢不能伸縮者今人以為臍風實則其血沮敗肌肉不成血脈不斂也小兒初生口撮如囊吮乳不得舌強唇青面色黃赤者即名之為撮口也撮口臍風唇口收束鎖緊舌強直者死證也撮口吐白沫四肢厥冷者不治之證也口僻者足陽明之筋有寒則急有熱則緩也喎僻不遂者邪氣反緩正氣即急也口歪於左者右邊癱瘓左臉動肉縮短也口歪於右者左邊癱瘓右臉動肉縮短也口眼喎斜者風中經絡也口耳為僻眥急不能卒視者足陽明手太陽之筋急也口喎唇疹者足陽明病也驚掣悸語聲寬急混濁口喎冒昧好自笑者心虛寒厲風傷心也病先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲者瘧始發之狀也瘧而寒慄鼓頷者陽明虛也平人口振者亦陽明虛也口目動作者陽明終也下頦脫落者謂之落架風陽陰之脈縱緩不收也小兒睡熟齧牙者或腹有蟲積或欲出新牙也狀如感冒風寒畏風特甚時作狗聲每欲齧人及衣物小腹墜脹小便難者癲狗咬傷而毒發也小兒咬爪甲者疳病有蟲也小兒齧齒咬人者腎絕也痘症咬牙甚則脫落者疫氣內陷於腎也陽明病口燥但欲漱水不欲咽者必衄血也傷寒一日頭痛口乾而煩滿者巨陽與少陰俱病也少陰病自利清水色純青心下必痛口乾燥者急下之證也少陰病得之二三日口燥咽乾者亦急下之證也口燥而喘身運而重冒而腫脹者肺中風也唇口乾燥生瘡者胃中客熱也脈自澀唇口乾燥者其人不欲飲也病者如有熱狀煩滿口乾燥而渴脈反無熱者此為陰伏是瘀血也傷熱氣喘甚則唾血短乏不欲食口燥咽乾者氣極也熱病七八日脈微小溲血口中乾一日半死脈代者一日死也熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不治也丁腫五六日不瘥眼中見火神昏口乾心煩者死證也嗌乾口中熱如膠者足少陰之證也大病瘥後喜唾久不了了者胃上有寒也小兒流涎不已者脾氣虛也流涎滯頤者脾冷也口中多涎者上焦寒也虛滿而咳善嘔沫者手太陰厥逆也人之涎下者蟲動也吐涎心痛發作有時者蛔之為病也蛔心痛心腹中痛發作腫聚往來上下行痛有休止腹中熱善涎出者是蛔咬也脾脈微急食飲入而還出後沃沫者膈中病也癇發痰涎壅盛氣促昏倒口吐痰沫者痰癇也喜吐沫者豬癇也癲疾嘔多沃沫氣下泄者皆不治也髮直如麻口吐沫者死證也反胃口中多出沫沫大出者死證也膈噎吐如蟹沫者脾敗也心下熱痛掌中熱時時善嘔口中傷爛左寸脈陰絕者心虛也口瘡腐爛者心病也口糜者膀胱移熱於小腸也病苦身熱未去口中生瘡心中煩滿汗不出身重左寸脈陽實者手太陽小腸實也口中生瘡脹滿不通者大腸實熱也口瘡者邪之出也口爛蝕齦者三焦相溷內外不通臟氣相熏也此皆口之形容也診唇望法提綱既視其口當察其唇唇也者齒之垣也脾之官也肌肉之本也經曰脾者諫議之官知周出焉其充在肌其華在唇故視唇之好惡可知脾之吉凶何則黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾此形容之常也左病者應在左右病者應在右上應乎上下應乎下而凡形容之變氣色之殊皆可以是推之此部位之分也按部位而視形容則唇腫者病氣實唇痿者形氣虛唇短縮者脾傷唇不收者脾病唇爛者陽明之證唇反者太陰之終唇焦乾者病在肉唇枯槁者病在脾唇瘡者邪從外解唇裂者毒從內發唇內生瘡者腹中有蟲唇上碎裂者胃經有熱唇口僻者風中陽明之筋唇口撮者風入陽明之脈諸太過者病在外諸不及者病在內此皆形容之變也視形容而觀氣色則唇赤者常色也深赤者為太過淡紅者為不及淡白而黑者寒甚深赤而黯者熱深青而深者主痛青而淡者為寒唇白者脾虧唇黃者脾病諸色淺者正氣虛諸色深者邪氣實明潤而有血色者生枯暗而無血色者死此皆氣色之殊也夫分形容氣色而言之所以識其常合形容氣色而觀之所以通其變然究其常變而原其始終體用雖殊莫不以神為本夫神也者明潤精爽而有血色者也得則生失則死易傳云精氣為物遊魂為變是故知鬼神之情狀其死生之謂乎診唇形容條目診唇形容既已述其提綱還當集其條目如唇口俱赤腫者肌肉熱也上唇厚大下唇細小者腹脹也唇白而腫者脾絕也唇舌皆腫大便赤泄溺血足腫者九日死肉絕也唇腫齒焦黑者脾腎絕也唇薄似有笑狀者內癰之危證也唇肉縮小恍似與人笑者或膈間熱或腹中痛也脾傷唇雖萎黃語音若轉者猶可治也唇縮流津者脾冷也虛勞唇寒齒宣露者死證也病苦頭痛目眩驚狂喉痹痛手臂卷唇吻不收右寸脈陰陽俱實者手太陰陽明肺與大腸俱實也唇吻不收舌不轉失音耳聾目瞀者邪中臟也唇爛而齒牙脫落者邪伏陽明發為牙疳也唇反黑無紋者脾敗也病人唇反人中滿者三日死也唇反人中滿舌痿者肉先死足太陰氣絕也病人鼻下平者胃病也肌肉不滑澤肉滿唇反者肉先死也唇焦乾者病在肌肉也口苦舌強嘔逆酸心氣脹唇焦者脾勞也唇焦者脾蒸也下唇焦者小腸蒸也熱病口燥唇焦者病在脾也唇焦枯無澤者脾熱也病苦胸中喘腸鳴虛渴唇乾目急善驚泄白右寸陽虛者手陽明大腸虛冷也寸口脈不出反發其汗陽脈早索陰脈不澀身體反冷內煩多吐唇燥小便難便如爛瓜豚腦者傷其津液肺為之痿也唇焦肉白腠理萎瘁者血滅之證也病人唇口忽乾者脾胃內絕也脾前病唇則焦枯無潤脾前死唇則干青漸縮急齒噤不開若天中等分墓色應之者必死不治也平人色暗唇皮乾者夭壽之徵也婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥者此病屬帶下曾經半產瘀血在少腹不去也皮膚痛唇舌槁無汗者肌寒熱也唇口瘡者邪之出也瘧病唇口生瘡者邪將解也唇裂齒齦青黑九竅血出者中莽草之毒也唇口舌頭皆破裂皮肉似湯火疱起漸次成膿者中金蠶之蠱毒也身發小疱作青黑色眼睛聳出舌上生小刺疱綻出口唇破裂腹膨脹爪甲青黑者中砒霜之毒也病人上唇有瘡者蟲蝕其臟也下唇有瘡者蟲食其肛也齒齦無色舌上盡白甚則唇里有瘡四肢沉重忽忽喜眠者蟲病也唇上如瘡面黃肌瘦腹大者疳病有蛔蟲也上唇內有瘡如粟心內懊憹痛悶唾血者此蟲在上蝕其臟也下唇內生瘡其人喜眠者此蟲在下蝕其下部也口唇動而偏喎者風入其脈也口唇緊小不能開合飲食不得者繭唇也舌如針刺唇上微麻口漸收小不能張甚則腹鳴且脹者中河豚之毒也小兒生下五六日口唇撮聚不能吮乳者人以為臍風也此皆唇之形容也診唇氣色條目既集唇形之條目當集唇色之條目諸書謂唇紅紫者熱也唇赤而吐者胃熱也唇色赤黑者胃中熱也上下唇皆赤者心熱也上唇赤下唇白者心腎不交也唇色深紅灑淅寒熱喘咳者肺之虛熱也唇紅喉耳生瘡腹脹痛身熱脈滑數者蛔脹也久病唇紅者難治也唇舌鮮赤腮紅發熱咳嗽噴嚏者疹也唇舌鮮赤腮紅發熱眼如醉眼而含淚指梢冷者痘也脈大身熱不能飲食舌赤唇紅喜飲冷水頻頻下痢者噤口痢也食入即吐口渴思冷嘔吐酸涎身熱唇紅溺赤者熱吐也小兒唇紅厚者脾胃健易養也婦人唇紅厚者衝脈盛易產也唇淡白者虛也唇慘白而吐者胃虛也唇白食少喘咳者脾肺氣虛也朝食暮吐乳食不化四肢逆冷面唇色白者寒吐也唇色或紅或白胃口時痛時止頻嘔清涎者蟲吐也齒齦無色舌上白煩憒不知痛癢之處或喜眠下痢者蟲蝕其肛也面上白斑唇紅能食顏色不常臉上有蟹爪路者便有蟲也痛如咬心時作時止口吐清水人中鼻唇一時青黑者蟲痛之證也妊娠唇白者血不足產或難也唇白而地庫光明者病可治也唇白目內眥白面瘦而白四肢腫或腦痛脈跳而數者心虛血不足也面唇清白渴喜熱飲痢時腸鳴切痛者此為寒痢虛寒之證也舌赤唇焦喜飲冷水腹中窘痛溺短色赤頻頻下痢者此為熱痢裡熱之證也脾疳肚大青筋唇口無色人中平痢不止者不治之證也唇白如枯骨者死證也口噤唇青舌本縮者小腸寒也唇口青白而黑者寒也唇青額黑者血氣虛怯為冷所乘也卒厥唇口青者身冷為入臟即死身溫汗自出為入腑即愈也唇口俱青黑者冷極也筋不能轉爪甲皆痛舌卷唇青轉筋卵縮胻脈疼急腹中絞痛或便欲絕不能飲食者筋虛極也笑而伸伸而反憂熱而且狂悶亂冒昧言多謬誤者此心已傷若口唇正赤可療青黃白黑不可療也唇青紫者胃氣虛寒也唇色黑瘀目睛凸露呼吸上逆者哮喘也乾霍亂吐瀉不得胸腹脹硬手足冷過腕膝脈伏喘急舌卷囊縮唇青黑者死證也癰疽證聲嘶色脫唇鼻青黑面目四肢浮腫者惡候也唇青人中反者三日死也病人唇青體冷遺尿者膀胱絕四日死也唇黑者胃先病也環口黧黑者脾腎絕也唇色如漆黑者脾胃將絕也水病唇黑者肝傷不可治也兩顴昏暗唇色慘黑者氣不足血已枯也唇口青黑吐逆腸腹絞痛不可忍發狂七竅迸血或外腎脹大者中砒霜之毒也唇色青黑者即刻身亡也面青唇黑面黑唇青者皆死證也舉體消瘦語音沉澀聲如破鼓舌強不轉而好嚥唾口噤唇黑四肢不舉身體極重便利無度者脾虛寒甚則不可治也此皆唇色之條目也四白望法提綱既視其唇當察唇之四白四白者口唇四際之白色也考之內經督脈至人中任脈至承漿衝脈絡唇口足陽明之脈挾口環唇手陽明之脈挾口交人中經曰脾胃大腸小腸三焦膀胱者倉廩之本營之居也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣故五閱五使篇曰口唇者脾之官也以部位言之上為陽下為陰左為陽右為陰察其色之上下左右可辨其病之上下左右也青赤黃白黑五色合之五行應乎五臟也太過者病在外不及者病在內腑主乎外臟主乎內也於是乎有澤夭之分焉所以辨其成敗也有浮沉清濁之分焉所以辨其表裡陰陽也有微甚散摶之分焉所以辨其虛實久新也以五色相應之理推之其病症可知也以五行生剋之理推之其順逆可知也以氣色部位合而推之其臟腑相乘之理又可知也經云五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也千金云病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治唇黑者胃先病微燥而渴者可治不渴者不可治此皆診色之要也若合四診而觀之參四時而辨之推之無窮用之不盡矣牙齒望法提綱蓋聞上曰齒下曰牙兩旁曰牙當中曰齒然齒者總謂口中之骨主齚齧者也家語曰男子八月生齒八歲而齓女子七月生齒七歲而齓蓋齒者骨之所終也經言丈夫八歲齒更三八真牙生七八齒槁女子七歲齒更三七真牙生七七齒槁夫齒之為言始也年也腎之標骨之餘也少長別乎此盛衰見乎此也以形言則齒食多長也食少者幼也以色言則齒色黃者長也色白者幼也是皆長幼之常非疾病之變也及其病而察其變則又有提綱焉一曰形容之變二曰氣色之變察其滋潤乾燥可知病之寒熱察其枯槁明亮可決病之死生形容之變者咬牙為邪入於胃齘齒為風入其經下齒齲者手陽明上齒齲者足太陽長而枯者骨先絕脫而落者症多凶氣色之變者齒忽黃為腎虛齒忽黑為腎熱滋潤者津液猶充乾燥者津液已耗形色枯槁者精氣將竭形色明亮者精氣未衰析而言之互而觀之合五官參四診而吉凶之辨虛實之分瞭然如指掌矣若夫牙齦形色當以腫起為實陷下為虛深赤為太過淡紅為不及可與診唇之法比例而推也牙齒望法條目既知牙齒之提綱當知牙齒之條目諸書謂雜病咬牙者胃實也痘症咬牙者死候也痘症咬牙齒落者無不死也小兒齒嚼咬人者腎絕之證也人之自齧舌者厥逆走上脈氣不至也齧舌者少陰氣至也齧頰者少陽氣至也齧唇者陽明氣至也胸滿口噤臥不著席腳攣急又齘齒者痙病也痙者腰折瘛瘲齒噤齘也小兒蝕齒者疳蟲之候也齒齲者手陽明絡實則齲聾之證也肉濡而卻齒長而垢發無潤澤者骨先死少陰絕也骨枯肉軟齒長而垢發無澤者骨先死足少陰氣絕也面黑齒長而垢腹脹閉上下不通者少陰終也腎中風者其人踞坐而腰痛視脅下左右未有黃色如餅粢大者尚可治若齒黃赤鬢髮直面土色者不可治也小兒齒落久不生者腎氣虧也病人齒黃枯落者骨絕也牙黃落者骨絕十日死也牙床腐爛牙齒脫落者牙疳之凶候也齦肉赤爛疼痛口臭血出牙枯脫落穿腮蝕唇者牙疳也牙疳穿腮齒落者難治也齒如黃豆者腎氣絕也齒如熟小豆其脈躁者陰陽俱竭也齒垢黃面目爪甲上黃者黃疸也唇腫齒黑者死證也唇腫唇黑齒焦者腫脹之死證也病人齒忽變黑者十三日死也目無精光齒齦黑者心肝絕也色黑而齒槁者腎熱也熱病唇焦齒燥者津液耗也虛極之病唇枯齒乾者死候也齒為暴枯面為正黑目中黃腰欲折自汗出如流水者四日死一曰人中平八日死腎絕也病無所在汗注不休齒本槁痛者骨寒熱也骨寒熱病無所安汗注不休齒未槁者可治齒已槁者不可治骨厥亦然也齒黑腰痛足逆冷者骨蒸也至若黃髮兒齒者壽考之徵也唇亡齒寒者衰憊之兆也牙床紅腫者陽明之病也牙床潰爛者腸胃之證也重齦病齒齦腫如水泡者熱蓄於胃也小兒面色黧黑齒齦出血口中氣臭足冷如冰腹痛泄瀉啼哭不已者腎疳也齒齦間津津出血不止者陽明之經病也牙肉色白者非久病血少即失血過多也牙肉之際有藍跡一線者沾染鉛毒也若服水銀輕粉亦令牙床壅腫也此皆診齒之目也診鼻望法提綱天地氤氳萬物化醇男女媾精萬物化生五官先生鼻五臟先成精精乃一身之本頭為五體之尊是以雷公問道黃帝傳經五色獨決於明堂四診先觀其天牝蓋鼻者形之始也氣之門戶也呼吸之間通乎天地貫乎經絡五臟六腑無不畢達四體百骸無不周遍者也分其部位則臟腑六部之提綱是已辨其氣色則陰陽十法之提綱是已其相乘之理合之部位可推也其相應之理合之氣色可推也肝青心赤脾黃肺白腎黑與夫聲音臭味情志脈病亦無有不可推者凡諸望法皆當比例以相參也金匱要略云鼻頭色青腹中痛若冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死是宜以四時參之以十法辨之矣第色雖當辨形亦宜分望之之法又有提綱焉蓋鼻者肺之合也鼻大者臟氣有餘鼻小者臟氣不足腫起者邪氣盛陷下者正氣衰鼻煽張者肺虛鼻仰息者肺實鼻枯槁者寒熱之證鼻蝕爛者疳瘡之形鼻竅乾燥者陽明之經病鼻柱崩壞者癘風之敗症鼻下紅腫如瘡者腹中有蟲之疳病鼻流濁涕者外受風熱鼻流清涕者外感風寒鼻淵者腦中熱故涕下滲鼻衄者陽絡傷故血外溢鼻生瘜肉謂之齆鼻生粉刺謂之齇此皆鼻形之望法也析而言之合而觀之察五官參四診變在其中矣至於骨部起者壽骨部陷者夭故鼻準貴乎豐隆焉他如氣之粗細息之疾徐嚏之有無竅之通塞當詳各門容後續述診鼻形容條目診鼻條目氣色已述明堂之中形容當集提綱之下靈樞云五色之見各出其色部部骨陷者必不免於病其色部乘襲者雖病甚不死是亦察色分部之要也至其形容諸書以為喘息鼻張者肺病也初病鼻煽者邪風壅塞肺竅也引息鼻張呼吸急促惕惕悶悶無痰聲者憂思氣鬱也鼻煽喘汗者肺絕也鼻煽張者肺絕也口鼻虛張短氣者肺絕三日死也喘喝胸盈仰息者肺實也鼻槁臘不得汗毛髮焦皮不可近席者皮寒熱也鼻孔忽仰者死證也鼻爛者疳瘡也身熱目痛身干不得臥者傷寒陽明經之證也傷寒鼻乾燥者陽明病將衄血也陽明病脈浮發熱口乾鼻燥能食者衄證也傷寒脈浮鼻中燥者必衄血也鼻孔燥黑如煙煤者陽毒熱深也鼻口乾燥大小便不利者癇候也酒癉無熱靖言了了腹滿欲吐鼻燥者脈浮先吐之弦先下之也鼻乾喘促氣逆者氣蒸也鼻孔乾者肺枯也鼻乾黑燥者火剋金也鼻孔黑燥無涕者肺絕也鼻柱壞而色敗皮膚潰而有瘍者風寒客於脈而不去發為癘風也癘風鼻柱壞者骨先死也癘風鼻梁崩塌眼絃斷烈唇翻聲啞者骨死也癘風鼻柱崩倒鼻中生瘜肉者蟲食其肺也鼻塞涕濁者風熱也人之鼻洞涕出不收者頏顙開分氣泄也中寒家喜欠其人清涕出發熱色和者善嚏也欲嚏不能者此人肚中寒也鼻塞流清涕者邪未解也鼻塞流清涕發熱咳嗽自汗惡風者傷風也痰清涕清者寒未去也少腹膀胱按之內痛若沃以湯澀於小便上為清涕者胞痹也鼻流清涕呵欠煩悶咳嗽噴嚏面腫腮赤者疹也濁涕下不止者膽移熱於腦則辛頞鼻淵也口鼻出血不止者腦衄也鼻衄發熱身無汗口乾鼻燥者邪氣實也鼻衄面黃白身無熱血出多而不止者正氣虛也衄而不止脈大者逆證也血外溢而衄者陽絡傷也鼻齆瘜肉者熱滯於陽明之經絡也鼻齇者寒氣之所薄也小兒頻揉耳鼻者疳證也鼻塞赤癢疼痛浸淫潰爛下連唇際成瘡咳嗽氣促毛髮焦枯者鼻疳也千金云肺前病鼻則為之孔開焦枯肺先死鼻則為之梁折孔閉青黑色若天中等分墓色應之必死不治此皆診鼻之條目也診耳望法提綱既察其鼻當觀其耳耳也者腎之官也故察耳之好惡可知腎之強弱也何則黑色小理者腎小粗理者腎大耳高者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾此察耳形之常也以色言之有左右之殊有上下之辨左為左右為右上應乎上下應乎下也腎之候也腎主骨故耳起五色者病在骨也黃赤者多熱氣青白者少熱氣黑色者多血少氣黃赤為風青黑為痛白為寒屬分五行亦應乎五臟也氣色之變可以十法推之生克之理可以五行推之其餘望法有可比例者宜察其病辨其證而合參之也若夫耳形之診當以厚而大者為形盛薄而小者為形虧腫起者邪氣實消減者正氣虛潤澤則吉枯槁則凶合之於色亦可辨其寒熱虛實焉他如下消則耳輪焦乾腸癰則耳輪甲錯腎前病耳則為之焦枯腎前死耳則為之𪒠黑焦癖若天中等分墓色應之必死不治是皆主病之目也痘科尚有觀耳後絡脈之詩因續四句於其後其詩曰耳後紅筋痘必輕紫筋起處重沉沉兼青帶黑尤難治十個難求三五生予續之曰冷暖陰晴色變更須將痘證辨分明望聞問切能參悟不看紅筋徹底清眼眉望法提綱蓋聞精之榮以須氣之榮以眉眉也者稟木氣而側生者也以經絡言之則屬乎手足太陽陽明矣其有多少疏密粗細長短之殊者亦由氣血有多少賦稟有清濁耳相家知其常固可察人之賢否醫家辨其變亦能測病之死生道雖不同其揆一也今求其法蓋有六焉眉系傾者膽將絕眉衝起者命將亡眉睫墮落者癘風之證眉毛頻蹙者疼痛之容潤澤者血氣足枯槁者血氣衰也至若眉中之色前人亦有言者其詩曰黃色入目一年期黑色從眉繞目悲若然白色連眉目知是皮膚肺疾微眉中若見青赤黑遠候還須半年期近看三五七日內忽然暴死更無疑然以余望之當察澤夭以分成敗觀清濁以辨陰陽視微甚以知虛實四診合參其庶幾乎髭鬚望法提綱聞之發屬心稟火氣而上生須屬腎稟水氣而下生故男子腎氣外行而有須女子宦人無須而眉發不異也然分部位而言則唇上曰髭屬手陽明頦下曰須屬足少陰陽明兩頰曰髯屬足少陽其經血氣盛則美而長氣多血少則美而短氣少血多則少而惡氣血俱少則其處不生氣血俱熱則黃而赤氣血俱衰則白而落察其經絡之部位可知其經絡之血氣矣然部位雖殊要皆屬於腎通於經而生於衝任焉經曰衝脈任脈皆起於胞中上循背裡為經脈之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須亦不生天宦未嘗被傷不脫於血而衝任不盛宗筋不成有氣無血唇口不榮故須亦不生此皆須之常也如因病而觀之惟癘風有鬚眉墮落者然余謂血氣未衰須色當潤澤血氣已竭須色當枯槁其由黑而白由白而黃者乃壯老之常盛衰之變也至若氣有滑澀血有清濁而其須不同者皆可以經絡部位推測而知也發髲望法提綱竊聞腎之華在發血之榮以發蓋發者血之餘血者水之類也經言女子七歲髮長丈夫八歲髮長五八發墮八八發去者蓋腎主腦腦者髓之海發者腦之華腎盛則髮長腎衰則發墮腦減則發素也其或年少而發白年老而發黑者賦稟不同也以部位分之頭上曰發耳前曰鬢中行屬督脈二行屬太陽三行屬少陽頭維額角足陽明也曲鬢懸顱足少陽也其經血氣盛則美而長氣多血少則美而短氣少血多則少而惡氣血俱少則其處不生氣血俱熱則黃而赤氣血俱衰則白而落察其經絡之部位可知其血氣之盛衰其因病而變者察之又有六法焉曰逆上曰衝起曰直曰落曰潤澤曰枯槁蓋逆上者死證也衝起者絕候也因疳積而發亂鬇鬡者可療因氣竭而髮直乾枯者不治病久而發落者精血虛病風而發落者血液燥潤澤者血氣未竭故生枯槁者血氣已竭故死善診者察其發觀其證可以知其逆從矣若夫髮直如麻者小腸絕髮結如穗者小兒疳面無血色頭髮墮落者血極之證面色不變頭髮逆上者癇病之徵汗出發潤喘不休者肺先絕齒長骨枯發無澤者骨先死此皆診發之目也診頭望法提綱頭為五體之尊百骸之長自囟至心如絲相貫不絕是謂諸陽之會精神之府望之之法可不深求其理哉按內經陽明之脈行於前太陽之脈行於後少陽之脈行於側厥陰之脈會於巔督則自背中行而上頭至鼻任則自腹中行而上頤循面此皆經絡之行即部位之分也由是以形言之則骨部皆大者多壽骨部皆小者多夭皮肉腫起者為實皮肉陷下者為虛囟陷者腦髓不足而難治囟腫者臟腑不調而難療骨縫不合者賦稟弱頭項皆軟者血氣虧此察頭形之綱領也以容言之則仰首者其病在陽俯首者其病在陰蹙其額者頭痛皺其眉者心憂頭項強直者邪氣實頭垂傾欹者正氣虛頭獨動搖者風也更有心絕之證頭難回顧者寒也亦屬陽明之經此察頭容之綱領也夫如是視上下以辨其經絡審左右以究其逆從合之五官參之四診而形容之變病症之殊皆可識常通變矣至於妊娠四月欲知男女遣妊娠面南行還復呼之左回首者是男右回首者是女亦想當然耳面形分屬五臟嘗思診面之法非特明堂五色面貌五官可分五臟也其面形亦有可分者二一則因形層以分之如肝合筋心合脈脾合肉肺合皮腎合骨筋者肝之部脈者心之部肉者脾之部皮者肺之部骨者腎之部推而論之皮有厚薄澤夭肉有肥瘦消長脈有小大遲數筋有粗細緩急骨有大小堅脆太過者為有餘不及者為不足皆可辨其盛衰虛實焉此形層之分也一則因經絡以分之如督脈自背中行而上頭至鼻任脈自腹中行而上頤循面衝脈榮於唇口蹺脈會於睛明聽宮顴髎之分手太陽也眉沖五處之分足太陽也迎香禾髎之分手陽明也頰車巨髎之分足陽明也耳門和髎之分手少陽也前關聽會之分足少陽也推而論之腫起者為實陷下者為虛腫起為太過其病在外陷下為不及其病在內此經絡之分也由是觸類旁通即一指之小四體之大其形層經絡無不皆然至若因證言病如諸書所謂大頭瘟兩目鼻面腫者陽明耳前後並額角腫者少陽腦後項下腫起者太陽面腫曰風面目腫大時熱脈沉滑中有水氣曰風水面浮腫氣逆多涕唾曰咳上氣面浮腫息肩脈浮大曰不治短氣面腫鼻不聞香咳嗽唾痰兩脅脹痛喘息不定曰肺勞面目浮腫曰陽虛胃冷面目浮腫至項曰陽虛氣結病人營衛竭絕面浮腫曰死面腫色蒼黑曰死咳嗽羸瘦脈堅大曰死咳嗽脫形發熱脈小堅急曰死肌瘦下脫形熱不去曰死兩腮消瘦縮入曰胃虛肉絕外此而痘疹癰疽癘風時疫其病在頭面者皆可按部位分經絡合之面容參之面色以辨其同異而判其吉凶也然其中腫起為實浮腫為虛何也蓋形之聚散不同色之澤夭亦異實者邪氣實虛者正氣虛腫而屬虛者邪氣實而正氣虛也推之於痘疹癰疽其義一也面容分屬五臟診面之法有形焉有容焉分而言之則理明合而診之則病著夫形也者言乎其體也容也者言乎其態也以形為體以態為用而五臟之分五志之辨可由是而察焉何者怒則厲然而目張喜則油然而頤解思則嫗然而瞼定悲則瞿然而泣出恐則薄然而氣下怒者肝之容喜者心之容思者脾之容悲者肺之容恐者腎之容此面容五臟之分也怒則氣逆喜則氣緩思則氣結悲則氣消恐則氣下此五臟之分五志之病也由是而觀有太過有不及太過者病在外不及者病在內太過則薄所勝而乘所不勝其不及則所勝妄行而所生受病所不勝薄之也然此就太過不及而言又當隨時以處中焉中庸云喜怒哀樂之未發謂之中發而皆中節謂之和蓋中者無所偏倚和者無所乖戾當喜怒而喜怒當哀樂而哀樂無病之容也其或發而不中則有偏倚發而失節即有乖戾故經曰多陽者多喜多陰者多怒肝氣虛則恐實則怒心氣虛則悲實則笑不休怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思憂傷肺喜勝憂恐傷腎思勝恐蓋以五志之變合五行而推也善診者觀察病人之態推而極之補其偏救其弊則失中者中而違和者和矣診腹望法提綱嘗觀銅人內景諸圖臍在腹中胃居臍上腸居臍下其中行直行者任脈也次於任脈者足少陰次於少陰者足陽明陽明之旁足厥陰也厥陰之旁足太陰也若少陽則行於側太陽則行於背矣然其分屬臟腑者又與脈行異如胸膈之上心肺之部也脅肋之間肝膽之部也臍上屬胃臍下屬腸大腹屬太陰臍腹屬少陰少腹屬厥陰衝任在於中央腎部主乎季脅以及左脅屬肝右胠屬脾皆診家所宜究心者由是而觀則上下左右不同前後中外亦異按其經絡分其部位而病症之殊治療之辨亦有確可憑者如腹大支滿或上肢兩脅者屬胃脅下脹痛善太息口苦者屬膽腹氣滿少腹尤堅者屬三焦少腹偏腫而痛者屬膀胱少腹䐜脹引腰而痛者屬小腸腸鳴而痛飧泄不化者屬大腸䐜脹經溲不利者為脾喘而兩胠滿者為肺腹滿引腰背者為腎脅下滿而痛引小腹者為肝小腹滿大上走胃至心者足厥陰腹滿大便不利上走胸嗌者足少陰厥而腹滿響響然者足太陰是皆部位上下之分臟腑經絡之辨也析而言之臟病為積腑病為聚積終不移聚則轉移居臍上為逆居臍下為從皮厚色蒼者皆屬氣皮薄色澤者皆屬水腫起者為實陷下者為虛腹腫脹者病氣有餘腹消減者形氣不足腹滿按之痛者為實按之不痛者為虛腹滿時減復如故者為寒腹滿不減且燥實者為熱新積痛可移者易已積不痛不可移者難已腹脹心窩未滿者可治心窩已滿者不可治缺盆未平者可治缺盆已平者不可治筋未青漲高起者可治筋已青漲高起者不可治從上腫下者屬氣其邪在外從下腫上者屬水其邪在內男從身上腫下女從身下腫上者易治男從身下腫上女從身上腫下者難治先起於腹而後散於四肢者可治先起於四肢而後歸於腹者難治旋消旋減者正勝邪為可治旋消旋起者正不勝邪為不可治石水起臍以下至小腹腄腄然上至胃脘者死不治久病腹皮甲錯著於背而成深凹者腸胃乾癟亦死不治是皆診腹之要也至若按其腹窅而不起腹色不變為膚脹隨手而起如囊裹水之狀為水脹腫聚往來上下為蛔脹彈之而聲空者是氣彈之而聲實者是水婦人腹皮寬大者子多緊急者子少妊娠腹形如箕者是男腹形如釜者是女男胎腹硬女胎腹軟如覆杯者則男如肘頭參差起者則女冷者為死溫者為生若是雙軀令人摸之冷在何面則知死在何處凡諸診候能參合而行之皆確有可憑者焉診背望法提綱嘗思古聖以背為陽腹為陰先賢以背為陰腹為陽豈前後有異而上下不同歟然愚謂以體之剛柔言則背陽而腹陰以用之動靜言則背陰而腹陽且陽化氣陰成形是腹背皆可謂之陰陽在外陰在內是腹背皆可謂之陽陰陽之道其大無外其小無內豈特一端而已哉夫背者胸中之府其中行乃督脈之所行其第二行挾脊各一寸半第三行挾脊各三寸者太陽之所行也其經脈自上而下則部位有上下之分其疾病或左或右則部位有左右之辨推而言之身半以上為陽身半以下為陰左為陽右為陰皮膚在外為陽筋骨在內為陰是故上下標本不同左右逆從亦異診之之法可不精求其理哉言乎其形則腫起者邪氣實陷下者正氣虛背高如龜曰龜背脊骨如鋸曰脊疳背爛透膜者形壞豈能治背平病水者肺傷不可療此形之因病而變者言乎其容則脊強者病在太陽反折者病在督脈背曲肩隨者胸中之府將壞項強腰折者背上之經已傷頸直背強合身回側者肝實之狀骨枯髓減腰脊不舉者骨痿之形呼吸搖肩者心中堅轉搖不能者腎將憊諸反張大人脊容側手小兒脊容三指者不可治此容之因病而變者於是合氣色以觀其同異參脈症而辨其本標將虛中有實實中有虛雖變化無窮而意見有定庶幾其各當歟且凡言實者邪氣實也言虛者正氣虛也邪氣實者正氣有有餘不足正氣虛者邪氣有有餘不足一切精微法應作如是觀非惟診背宜爾也診手望法提綱四肢為諸陽之本脾實主之然有上下左右內外之分焉嘗觀經脈篇手之三陰從臟走手手之三陽從手走頭陽行於外陰行於內陽則自下而上陰則自上而下析而言之左為陽右為陰上為陽下為陰手臂之在外者為陽在內者為陰自肩至肘曰臑自肘至腕曰臂臂下謂之掌掌下謂之指其大指曰拇指其次指曰食指內屬太陰外屬陽明其中指曰將指其屈而不伸者曰無名指內屬厥陰外屬少陽其小者曰小指內屬少陰外屬太陽此皆經絡之行即部位之分也推而論之男女有左右逆從之異經絡有上下標本之殊病症有內外淺深之辨望之之法可弗深究其理哉以形言之則形盛為有餘形瘦為不足手之壅腫者為實手之枯細者為虛左右偏枯曰偏風手指墮落曰癘風手掌腫無紋曰陰虛氣絕手背腫至腕曰陽虛氣結此皆以形言也以容言之則強者病氣實痿者形氣虛撒手者陽氣外脫握手者陰邪內伏手之伸者病在陽手之屈者病在陰屈不易伸伸不易屈者陰陽交合陰陽俱病也屈而不伸其病在筋伸而不屈其病在骨汗漏不止四肢微急者亡陽之證小腹急痛手足拘攣者將死之容攣急轉筋者邪氣實而傷於寒弛縱不收者正氣虛而因於熱瘛瘲不定者筋脈相引而難瘳振搖不定者血氣俱虧而可療兩手不舉者脾實四肢不收者脾虛掣衣揚手者煩躁猶可解循衣摸床者實熱已難除叉手冒心者血液大虧交手目瞀者肺病臂厥捶胸者脹悶之狀拒按者疼痛之容手如數物者風癇手不欲動者脾虧指不用者屬脈臂不遂者為痹手足漐習者肝絕之形手足嚲曳者風懿之狀此皆以容言也於是合形容而診之按經絡而驗之審其寒溫察其部位參四診以究同異分三因而辨本標病症之殊療治之變庶乎知所適從矣診足望法提綱嘗考內經陽氣起於足五趾之表陰氣起於足五趾之裡足之三陽從頭至足足之三陰從足走腹陽行於外陰行於內陽則自上而下陰則自下而上析而言之左為陽右為陰上為陽下為陰足之在外者為陽在內者為陰自臀至膝曰髀自膝至踝曰脛踝下謂之跗跗前謂之趾其大趾則少陽陽明厥陰太陰之所行其次趾中趾則陽明之所行其次於小趾之次趾則少陽之所行其小趾則太陽少陰之所行此皆經絡之辨部位之分也望之之法可弗深究其形容哉以形言則形盛為有餘形瘦為不足脛腫跗腫者水氣之實脛枯腳小者脾胃之虛脛有大小者腎壅偏枯股無生肉者脾虛氣竭足下平滿者傷腎之絕徵腳底先穿者癘風之敗證十指墮落者筋死十趾不用者經病兩腿消瘦曰腎消獨膝腫大曰鶴膝足腫至踝曰陽虛氣結腳腫上脛曰腳氣逆沖身體羸瘦獨足腫大者營衛俱微足趺壅腫兩膝如斗者胃氣欲絕此皆以形言也以容言則屈者為陰伸者為陽強者邪氣實痿者形氣虛拘急者寒邪縱緩者熱疾瘛瘲者筋脈相引振掉者血氣俱虛屈伸不能者筋將憊屈伸不利者腎已虧屈而不伸者病在筋伸而不屈者病在骨陰緩而陽急者陽蹺病陽緩而陰急者陰蹺病跌蹶能前不能卻者太陽經之傷蹠跛或左而或右者風寒濕之病轉筋者寒邪在筋掣節者寒邪在節足縱而不任地者大經空虛足搖而不任身者骨髓枯減足不收者脾氣虛足不舉者脾氣實揚手擲足者煩燥逾垣上屋者怒狂筋緩不能行者肝勞棄衣而狂走者胃實立不能坐坐不能起者陰陽交合陰陽俱病也此皆以容言也合形容而視之審經絡而辨之驗其足之寒溫切其脈之動靜參以四診究其三因而病症之變標本之殊亦可知其大略矣毫毛望法提綱心主身之血脈肺主身之皮毛皮毛者肺之合也太陰者肺也行氣溫於皮毛者也若析而論之則經絡之行部位之分又各有所主何則督行於背任行於腹手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹陰行於內陽行於外視其經絡分其部位其經之血氣盛則充膚熱肉血獨盛則滲灌皮膚生毫毛彼言十二經之氣血多少者論其常此言充膚熱肉生毫毛者察其變毫毛有長短粗細美惡由氣血有多少清濁盛衰是皆因人而異者也其因病而變又各不同毫毛畢直者風寒外感之證毫毛折落者肺臟內絕之形洒洒然毛聳者太陽中暍洒洒然毛立者虛邪中人毛焦者寒熱在於皮肌毛悴者情志傷其臟腑毛敗者肺熱而金受火之克毛枯者疳病而金乏土之生此皆診法之略也由是而觀當以粗而長者為血多細而短者為血少聳與直立為邪實焦與枯敗為正虛悴同折主死美而澤主生善診者察毫毛觀氣色聽聲音參脈證可以知其吉凶矣若夫毛竅之多寡或言八萬四千或言十萬八千而究竟不知幾萬幾千即能知其幾萬幾千亦何取乎幾萬幾千夫經絡之曲折病證之紛紜古聖述之於前昔賢驗之於後雖西醫剖視不能如此其詳而況針穴之微妙石藥之功能斷非技巧所能窺者乎然則今人不逮古聖也遠甚書曰事不師古鮮克有濟腠理望法提綱聞之津液滲泄之所曰腠紋理縫會之中曰理腠者是三焦通會元真之處理者是皮膚臟腑之紋理也字書謂膚肉之間為腠理以其有脈理焉三說合觀體用備矣考之內經則曰開曰闔曰粗曰細曰疏曰密有因天者有因人者有因腑而異者有因病而異者因天者何熱則人氣在外皮膚緩腠理開汗大泄血氣減皮淖澤寒則人氣在中皮膚致腠理閉汗不出血氣強肉堅澀此腠理之開閉因天之寒暑也因人者何膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒此腠理之粗細因人之脂膏也何謂因腑而異三焦膀胱者腠理毫毛其應密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而疏者三焦膀胱直稀毫毛者三焦膀胱結此腠理之疏密因腑而異者也何謂因病而異陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死能夏不能冬此陰陽更勝之變病之形能也然陽病亦有汗出者陰病亦有不汗出者其開也衛氣虛其閉也衛氣實是又因證而異可與診汗之法參觀也要之開則有汗閉則無汗察腠理之開閉視汗液之有無一也此腠理之開閉因病而異者也蓋觀粗細與疏密者欲明其體而觀開闔之常變者欲達其用也且夫腠理之開闔非腠理之自為開闔也有溫分肉充皮膚肥腠理司開闔者焉蓋衛氣也衛氣者下焦之所出太陰主其內太陽主其外者也陰平陽秘衛氣和矣衛氣和則分肉解利皮膚調柔腠理致密矣如是而云開闔則似開非開似闔非闔然非不開也非不闔也有時而開有時而闔或因寒暑或因冷暖或因動靜非病也常也時開則開時闔則闔者也設或不當開而開不當闔而闔豈得謂之無病哉合汗而診之因時而驗之參證而辨之知其開闔之常即知其開闔之變矣經曰謹察衛氣為百病母腠理之開闔衛氣之虛實也開闔虛實蓋可以忽乎哉尺膚望法提綱嘗謂從魚際至高骨卻行一寸故謂之寸從尺澤至高骨卻行一尺故謂之尺尺膚者尺澤至高骨之膚也蓋氣口為肺之脈皮膚為肺之合脈行膚內膚在脈外故視膚而有取乎尺也其視之之法有六曰緩曰急曰滑曰澀曰賁而起曰減而少氣夫緩者尺膚縱緩不急也急者尺膚緊急不緩也滑則不澀而有流利之容澀則不滑而有蹇滯之貌賁而起者沸起之狀減而少氣者損少之形蓋緩則為熱急則為寒滑屬陽而氣淖澤澀屬陰而血凝泣賁而起者太過為實減而少氣者不及為虛六者合觀變在其中矣經曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀脈大者尺之皮膚亦賁而起脈小者尺之皮膚亦減而少氣然則色脈皮膚皆當相應也合而觀之亦可推其順逆焉千金云風病則滑痹病則澀氣血盛則尺之肉豐盛氣血虛則尺之肉虧竭此亦診尺之要也論疾診尺篇曰尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也尺膚粗如枯魚之鱗者水泆飲也尺澀脈滑謂之多汗尺寒脈細謂之後泄尺粗常熱者謂之熱中尺堅大脈小甚少氣悗有加立死是又診尺膚以參脈證參脈證以決死生矣至若尺之部位手之寒溫因切而知者容後續述診皮望法提綱嘗思診尺膚之法可察皮之滑澀診腠理之法可察皮之粗細然皮不僅觀尺膚法不僅觀腠理則夫周身之皮當講周身之法而尺膚腠理之診亦宜比例而觀焉何則周身之皮實由周身之脈以灌溉周身之脈當分周身之部以參觀故經言欲知皮部以經脈為記夫皮者肺之合也筋骨在內為陰皮膚在外為陽也析而論之如形充而皮膚寬緩者壽形充而皮膚緊急者夭皮與肉相裹則壽皮與肉不相裹則夭薄皮弱肉者不勝時之虛風厚皮堅肉者能勝時之虛風皮虛者寒皮實者熱皮膚腫脹者邪氣實皮膚消減者正氣虛皮膚腫痛者病氣有餘皮膚潰爛者形氣不足皮膚潤澤者太陰氣盛皮毛枯槁者太陰氣衰皮毛焦者手太陰氣絕皮膚著者足太陰肉絕皮聚毛落者肺損皮枯毛折者肺絕皮毛虛弱者肺熱葉焦皮膚頑痹者癘風皮病身冷膚硬者脾不上下皮膚薄著者經脈空虛皮膚不收肌肉堅聚者寒濕之證皮膚空疏三焦經絕者血崩之徵肌膚甲錯兩目黯黑者內有乾血身皮甲錯腹中急痛者內生癰膿皮膚潰而有瘍者癘風也皮膚脫若蛇皮者癘風也癘風遍身如癬者脾病癘風潰爛無膿者血死少年皮生黑斑者不吉痘兒頭項皮赤者多凶凡腫脹皮厚色蒼者皆屬氣皮薄色澤者皆屬水諸痛瘡瘍斑疹麻痘色赤而紅者順青而黑者逆諸病症皮寒而燥者陽不足皮熱而燥者陰不足身澀而脈滑者死身滑而脈澀者死此皆皮部之診也由是推而言之則壽夭診於緩急強弱診於厚薄消減腫脹以診其虛實潤澤枯槁以診其盛衰八者交參則診視之法備而皮膚之變詳夫如是按經絡而分內外陰陽察部位而分上下左右參伍以觀錯綜以變庶乎其有得歟診肉望法提綱經言肝主身之筋膜脾主身之肌肉肉之大會為谷肉之小會為谿分肉之間谿谷之會以行營衛以會大氣聖人於此不啻三致意焉且脾胃屬土其充在肌故觀肌肉之消長可知脾胃之盛衰夫脾者孤臟以灌四旁者也胃者五臟六腑所稟氣者也診脈雖以胃氣為本觀形當以肌肉為先也若夫形肉已脫九候雖調聖人不曰可生而曰猶死則是肌肉之消長尤關胃氣之有無矣診之之法其可不講乎析而言之如形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣肥而澤者血氣有餘肥而不澤者血有餘氣不足瘦而無澤者血氣不足瘦而澤者血不足氣有餘肥者耐寒瘦者耐熱肉瘦削者脾虛肉壅腫者脾實肉蠕動者脾病熱肉瞤瞤者脾中風筋惕肉瞤者陽虛食減肉消者意損瘦削乾黑者肉極之證肉宛膲弱者肉痿之徵肉上粟起者寒客皮膚肌膚不仁者邪入絡脈肌肉充盛者形氣有餘肌肉消減者形氣不足肥人肉如棉絮者謂之無氣婦人肌若魚鱗者謂之帶下骨痛肉枯者寒勝其熱爛肉腐肌者熱勝其寒疳病形容羸瘦者症起腸胃之內癉瘧肌肉消爍者邪舍分肉之間脫肉者死破䐃者死大肉陷下大骨枯槁者皆死肌肉不滑澤肉滿唇反者肉先死癘風割切不痛者肉先死肉痿軟唇反人中滿者肉先死此皆肌肉之診也由是約而言之當以堅脆診壽夭以肥瘦診血氣以有澤無澤診盛衰以消減壅腫診虛實八者交推則診候之法備而肌肉之證明所謂肌者四肢間附骨之肉也䐃者肘膝後如塊之肉也曰谿曰谷則以血之流注如水之流注水注川曰谿注谿曰谷也若夫形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死是又合脈以觀之因症以辨之審其順逆而判其吉凶矣大凡診法皆當錯綜相參非獨診肌云爾絡脈望法提綱聞之直行曰經橫行曰絡諸脈之浮而外見者皆絡脈也絡也者本經別出之旁支聯絡於他經者也析而論之經十二絡十五皆辨其行以分其部按其部以診其病焉經絡論黃帝問於岐伯曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也岐伯對曰經有常色而絡無常變也言經脈之色有常絡脈之色無常也帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑亦皆應其經脈之色也言五臟之經應五臟之色也帝曰絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也言陰絡之色應五臟陽絡之色應四時陽外而陰內也其寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病者以其變之因乎時不因乎病故亦以為常也五色具見者謂之寒熱以其不應時之寒不應時之熱故以為寒熱也皮部論曰其色多青則痛多黑則痹黃赤則熱白則寒五色皆見則寒熱也蓋陽絡隨時而行者變從乎外天道之常也因病而見者變從乎內人道之變也合時與病而察之可知其變中之常常中之變矣至於兩跗上脈豎堅陷者足陽明病魚絡血者手陽明病手魚絡青者胃中有寒魚際絡赤者胃中有熱魚際脈黑者或是癇候其暴黑者留久痹也其青短者少氣也頸脈動喘疾咳曰水耳間青脈起者為掣痛耳後完骨上青絡盛臥不靜者是癇候臂多惕脈者謂之脫血經脈動惕者久而成痿驚跳不定者即為脈虛青紫之脈散見於面者多病風熱紅赤之脈散見於腮者多病痘疹此皆陰陽之絡因病而變者亦宜合時與病而察之也然愚謂營行脈中衛行脈外絡脈之見皆當有血色以間乎其中焉變見於左者應在左變見於右者應在右左右皆見左右皆病察其何部何色而斷其何臟何腑也至於絡之形容亦有粗細浮沉長短緩急之殊焉推而論之則絡之粗者病氣有餘絡之細者形氣不足猶脈之大則病進細則氣衰也絡之浮者病在外絡之沉者病在內猶脈之浮為在表沉為在裡也絡之長者氣治絡之短者氣病猶脈之長則氣治短則氣病也絡之緊急者為寒絡之縱緩者為熱猶脈之急為寒緩為熱也於是乎因人大小而定絡之粗細因人肥瘦而定絡之浮沉相時寒暑以驗緩急相時冷暖以驗短長八法互觀合之絡色參之脈證庶乎可通其變矣經曰凡此十五絡者實則必見虛則必下其見浮而堅其見大而明者多血細而沉者少氣亦此意歟若夫幼科食指之紋即手太陰之絡也痘科耳後之筋即手少陽之絡也皆可以是參觀者也絡脈主病提綱絡脈已言其診法矣然必先知其部與其病焉靈樞曰手太陰之別名曰列缺實則手銳掌熱虛則欠㰦小便遺數手少陰之別名曰通里實則支膈虛則不能言手心主之別名曰內關實則心痛虛則頭強手太陽之別名曰支正實則節弛肘廢虛則生肬手陽明之別名曰偏歷實則齲聾虛則齒寒痹膈手少陽之別名曰外關實則肘攣虛則不收足太陽之別名曰飛陽實則鼽窒頭背痛虛則鼽衄足陽明之別名曰豐隆實則癲狂虛則足不收脛枯足少陽之別名曰光明實則厥虛則痿躄坐不能起足太陰之別名曰公孫厥氣上逆則氣亂實則腸中切痛虛則鼓脹足少陰之別名曰大鐘氣逆則煩悶實則閉癃虛則腰痛足厥陰之別名曰蠡溝氣逆則睪腫卒疝實則挺長虛則暴癢任脈之別名曰尾翳實則腹皮痛虛則癢瘙督脈之別名曰長強實則脊強虛則頭重脾之大絡名曰大包實則身盡痛虛則百節皆縱凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也夫經言虛實者絡脈之病經言名目者絡脈之部知其病而察其部則察其部而知其病矣經又曰凡診絡脈脈色青則寒且痛赤則有熱其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也是則不但知其虛實且知其寒熱矣合前篇觀之其體用不已備乎別也之別當作故診筋望法提綱竊聞筋者力也肉中之力氣之元也靳固於身形也其候在目其主在肝膝為之府爪為之餘者也以部位分之則手之筋行乎手足之筋行乎足陽明行於前太陽行於後少陽行於側陰筋行乎身之陰陽筋行乎身之陽皆依經脈而行可依經脈而分也詳觀經筋篇手陰陽之筋皆起於手指陽筋自手而上行於頭面陰筋自手而上行於胸腹足陰陽之筋皆起於足趾陽筋自足而上行於頭面陰筋自足而上行於胸腹其為病也皆當其所過者轉筋支痛治用燔針劫刺以知為數以痛為輸蓋燔針所以治寒不燔針所以治熱診候之法寒則見其筋攣反折熱則見其弛縱不收在陽筋則見其不能俯在陰筋則見其不能仰見於膝則行走難以屈伸見於身則左右難以動搖損在筋者筋緩不能自收持痹在筋者筋攣不可以行走筋極肝傷則腰背相引難以俯仰筋死肝絕則舌卵捲縮不能展舒及夫痙癇瘛瘲頹疝陰病紐痛腫痛口目僻急皆可按部位而知經筋也若望其筋知其病惟腫脹有筋起之證傷寒有筋惕之文腫脹以青漲高起者為不可治則知未青漲高起者猶可治也傷寒以筋惕為發汗亡陽所致則知用溫經益陽之法當可治也至於筋溜者有所疾前筋屈不能伸邪氣居其間而不反也疹筋者尺脈數甚筋急而見其腹必急白色黑色見則病甚也斯二者亦可望筋而知病也其他筋瘻筋急筋攣筋弛亦有可見有不可見然察其病情按其部位皆可知其病在何經之筋也由是合而察之切而驗之見而得之而經筋之病庶可知其要矣診骨望法提綱聞之精神者天之分骨骸者地之分屬天者清而散屬地者濁而聚是故陽化氣陰成形精神為陽骨骸為陰且骨者髓之府髓者骨之充其候在耳其主在腎診之之法盛則見其筋骨勁強衰則見其形容傴僂骨損則見其骨痿不能起床骨極則見其齒動不能久立見於痹則骨重而難舉見於病則肢伸而不屈其行而振掉立不能久者則知骨之將憊發無潤澤肉不相親者則知骨之先亡及夫頭背腰膝之骨得強則生失強則死此皆骨之形容於外者也若見其骨知其病如靈樞云顴骨者骨之本也顴大則骨大顴小則骨小其形充而顴不起者骨小骨小則夭矣然則形充而顴起者骨大骨大當壽矣千金云兒生枕骨不成者能言而死尻骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死頭四破不成人通身軟弱如無骨者不壽此亦得強則生失強則死之謂也若夫經言五色之見各出其色部部骨陷者必不免於病其色部乘襲者雖病甚不死則知部骨不陷者可免於病部骨陷而色乘襲者若病甚則危也是又合氣色骨部而觀之也他如大骨枯槁大肉陷下皆為死證者以其脾腎絕於內骨肉消於外枯槁則皮著骨陷下則肉消盡也至於賦稟不齊骨骸有異又如本藏篇所謂赤色小理者心小粗理者心大無𩩲骭者心高𩩲骭小短舉者心下𩩲骭長者心堅𩩲骭弱小以薄者心脆𩩲骭直下不舉者心端正𩩲骭倚一方者心偏傾白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅胸脅弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾此又骨骸之常也至若骨之小大多寡合骨度篇洗冤錄觀之可知其要然非診家之急故不備錄爪甲望法提綱竊聞爪之生發之長營衛之行無頃刻止且爪者筋之餘膽之外候也靈樞曰膽應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結蓋膽者肝之腑爪者肝之華故以爪候膽也然候膽者言其常而診病者論其變也其變維何爪甲青者多凶爪甲赤者多熱爪甲黃者疸病爪甲白者寒證爪甲黑者或因血瘀而痛或因血凝而死要之潤則吉枯則凶爪色雖殊其變皆決於此矣諸書謂痹病骨痛爪枯者足少陽血氣皆少色蒼爪枯者肝熱爪甲黑乾嘔面青肢厥冷者病凶病人爪甲白者不治爪甲青者死爪甲下肉黑者八日死手足爪甲青呼罵不休者筋絕九日死小兒爪甲青黑忽作鴉聲者肝絕小兒咬爪甲者乳少成疳心病為瘧心煩甚欲得清水反寒多熱不甚若其人本來心性和雅今忽弊急言未竟便住以手剔腳爪此人心死名曰行屍是皆診爪之目也能參合而行之庶無虛虛實實之弊矣診乳望法提綱診乳之法內經未言李梃醫學入門云女人屬陰陰極則必自下而上衝故乳房大而陰戶縮也男子屬陽陽極則必自上而下降故陰莖垂而乳頭縮也楊士瀛曰男子以腎為重婦人以乳為重上下不同而性命之根則一診乳之法觀此亦可心解矣何也相書謂婦人乳頭朝上生子易養乳頭朝下生子難養以脾胃衝任之有強弱也乳大者子多乳小者子少以脾胃衝任之有盛衰也白小低偏者子息難以形色虧也黑大堅硬者子息好以形色全也男胎則左乳先脹硬女胎則右乳先脹硬陽從左陰從右也婦人受孕其乳當轉黑小兒臍風其乳當結核有諸中形諸外也至於婦人乳中堅硬不紅不痛者乳岩也乳中腫脹色紅且痛者乳癰也癰者壅也疽者阻也六腑有所壅則為癰五臟有所阻則為岩也合色脈而察之亦診婦人赤子之一助云爾臍府望法提綱臍之為言齊也以其當兩腎之中前直神闕後直命門而上下齊也臍也者人之命蒂也或謂胎中之息在臍道家之息在臍殊不知雞乳而卵中不閉水脹而臍內不通況觀於剪臍而帶中血出懷孕而腹中子鳴益可知母氣通於兒鼻母血通於兒臍矣然此特論臍之理非望臍之法也望之之法諸書謂臍大者多壽臍小者多夭以臍中為神闕相體之本也婦人臍深者子多臍淺者子少以臍內為子宮衝任之屬也人病臍腫反出者死以倉廩之本既竭飲食之精不輸也水病臍腫突出者死以決瀆之令不行州都之氣不化也積聚腫脹臍不凸者可治臍凸者不可治微則在於臟腑血脈之間甚則舍於臟腑血脈之外也懷孕三四月臍便平滿者女胎也懷孕八九月臍方平滿者男胎也女胎背母而懷男胎面母而懷也小兒多啼而臍凸者氣逆於內也小兒撮口而臍黑者氣絕於中也懷孕之外證臍色當紅黑臍風之死候臍府當青硬此謂誠於中形於外知微之顯也膿從臍出瘡繞臍生腸癰之候也任脈循臍而上衝脈俠臍而行又察臍之所宜知者若合病症而觀之亦診家之一助云爾腎囊望法提綱嘗謂肝脈絡陰器囊形屬腎臟故以腎為名也然任脈起於會陰之分督脈絡於合篡之間是二經亦各有所主焉察之之法其惟形色乎以形言之囊宜小紋宜細小兒囊緊實者多壽氣勝形也囊墜下者多病形勝氣也傷寒六七日囊縮者厥陰病甚邪氣傳入其經也傷寒十二日囊縱者厥陰病衰邪氣傳出其經也囊脹者謂之疝任脈為病也囊腫者謂之水關門不利也陰囊更加腫脹漸漸潰腐者病水死徵睪丸偏有大小時時上下者陰狐疝氣此觀形之法也以色言之小兒腎囊緊細色紫者多壽氣血足也寬大色白者多疾氣血虧也陰囊縐黑有弦者易養形色皆順也陰囊色赤無紋者難養形色皆逆也此察色之法也合而診之可通變矣陰莖望法提綱夫前陰者宗筋之所聚太陰陽明之所合也其精竅通於腎溺竅通於脬陰器屬於肝督脈絡之帶脈束之衝任滲灌之陽明主潤而為之長動乎情宰乎心而其病則生於房室診之之法如經言宗筋縱者陽明虛宗筋痿者肝氣弱縱挺不收者足厥陰之經傷於熱縮入不用者足厥陰之經傷於寒陽強則有腎熱強中之證陰痿則有魂傷骨極之因陰氣不起者傷於內囊莖腫脹者屬於疝陰囊及莖俱腫者水病之死證陰囊及卵俱縮者肝經之絕候疳瘡者淫穢之毒腫痛者濕熱之徵凡此諸候當參四診辨其寒熱虛實察其輕重淺深庶可識常通變矣至於兒生陰物不起亦為死證者豈以賦稟不足形體未備歟特察小兒宜從望診故並述之診汗望法提綱嘗思汗液之有無由於腠理之開闔而腠理之開闔則因衛氣之虛實故經云陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽俱有餘則無汗而寒夫汗者心之液在營則為血在衛則為汗者也若因而診之有部位之分有形色之辨部位者何在陽經之部者屬乎陽在陰經之部者屬乎陰頭額汗出者病在諸陽手足汗出者病在於胃心窩汗出者心臟虧虛陰下汗出者下焦濕熱汗出偏沮者使人偏枯之先兆汗不至足者熱病咳衄之危證此皆部位之分也形色者何三陽實三陰虛者汗不出三陰實三陽虛者汗不止有汗身熱者陽邪在營無汗身熱者陰邪在衛汗出少者為自和汗出多者為太過風濕發汗微微似欲汗出者風濕俱去漐漐如水流漓者病必不除黃汗者濕熱之證白汗者厥氣之徵紅汗者氣虛之候小兒初生汗出如血者多夭壽小兒初生汗出不流者不成人汗出如浴者酒風之候汗出如油者命絕之容汗出如流珠脈浮者衛氣衰汗大如貫珠不流者元氣絕濈濈然汗出者表將解漐漐然汗出者里未和汗出不止者陽亡於外奪血無汗者陰虛於內此皆形色之分也若夫時有寒暑衣有冷暖形有動靜腠理因之而開闔汗液因之而有無非病也常也其或飲食飽甚汗出於胃驚而奪精汗出於心持重行遠汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾是皆人事之異非病候之殊也故善診汗者必視寒暑觀冷暖察動靜知其汗之常以審其汗之變夫而後可按部位辨形色以分其表裡而判其虛實焉他如熱汗為陽冷汗為陰宜合體之冷熱而分之合病之陰陽而辨之則其診益備其用益明矣診血望法提綱嘗思血之為物也和調於五臟灑成於六腑其色屬火其形類水內主於心外行於營循環上下灌溉周流以應度數以奉生身故經曰血氣者人之神不可不謹養若乃將息失宜嗜欲過度外感六淫之邪內動五臟之志營衛不調臟腑相勝有過不及病斯見焉彼謂諸見血皆熱證者是知其屬火而不知其類水知其太過而不知其不及也析而論之則出於九竅曰九竅出血出於小便曰尿血曰血淋出於大便曰腸風曰血痔從鼻出曰鼻衄從舌出曰舌衄從齒齦出曰齒衄從汗孔出曰肌衄因嘔而出曰嘔血因吐而出曰吐血因咯而出曰咯血因唾而出曰唾血因咳而出曰咳血因嗽而出曰嗽血凡諸血證所出不同所因亦異而況有毆傷出血跌僕出血者乎況有月事逆行傷寒誤汗者乎他如外科之瘡瘍出血女科之崩漏奪血以及胎前產後半產下痢亦指不勝屈矣故內經謂諸血皆屬於心則可丹溪謂諸見血皆熱證則斷斷不可且就血而論其形色亦有可辨如諸書謂精壯者血輪多故色濃而赤虛弱者血輪少故色淡而稀陽證溢出鮮血陰證下如豚肝新血鮮紅舊血瘀黑色之鮮紫濃厚者為氣盛色之晦暗無光者為氣衰風證色青寒證色暗暑證色赤濕證色如煙煤屋漏便血淺褐色者已重深褐色者尤重褐色變黑者極重吐血帶痰沫及粉紅色者屬於肺正赤如朱漆光澤者屬於心包絡鮮紫濃厚者屬於脾青紫稠濃或帶血縷或有結塊者屬於肝咯吐稀痰中雜如珠血無幾色不鮮者屬於腎成盤成盞多兼水穀痰涎者屬於胃若從大便出者多屬大小腸從小便出者多屬膀胱腎此皆因形色而分也其出於五官四體又當因經絡而分焉故經曰陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血凡血證陽證則身熱多渴陰證則身冷不渴有潮熱者重無潮熱者輕上行多逆下行多順若吐出便凝摸之不黏指者為守臟之血口鼻俱出如湧泉者為心肺脈破則皆不可治也然予猶有說焉如吐血先鮮紅而後凝紫先多而後少先疾而後徐者其勢漸減先凝紫而後鮮紅先少而後多先徐而後疾者其勢漸增亦皆可以相參也若夫因氣色而病異因脈證而病異又當合四診而觀之此特粗舉隅焉以明諸見血非皆熱證也丹溪謂知其要者可一言而終言不可以若是其幾也何也不知其要斯害也已診痰望法提綱嘗謂虞書記時以鳥獸月令占候於蟲魚是因天之物以驗天也內經診病於水液後世辨證以痰涎是因人之物以驗人也蓋天道遠人道邇遠取諸物近取諸身其事雖異其理則同而況痰因病生病以痰著又事理之至明且顯者乎間嘗考之於書以為痰形稠而濁飲色稀而清寒痰青濕痰白火痰黑熱痰黃老痰膠其滑而易出者濕痰屬脾燥而難出者燥痰屬肺清而多泡者風痰屬肝堅而成塊者熱痰屬心有黑點而多稀者寒痰屬腎病新而輕者清白稀薄病久而重者黃濁稠黏多唾者胃寒流涎者脾冷舌難言口吐沫者邪入於臟腹時痛口吐涎者蛔亂於中咳唾涎沫口張氣短者肺痿之證咳唾膿血口乾胸痛者肺癰之徵其吐如米粥吐而腥臭者皆肺癰之候形如敗絮色如煤炲者悉老痰之容此諸書因痰涎之形色診病之淺深也或謂痰聲相應為輕不相應為重由稀而稠者病日退由稠而稀者病日進因痰嗽而吐血者多起於外感因吐血而痰嗽者多屬乎內傷亦可因證以相參也會而觀之析而論之則稀者為飲稠者為痰清者形氣不足濁者病氣有餘青白者少熱氣黃赤者多熱氣而凡痰形之變痰色之殊胥於是乎推亦於是乎斷矣大便望法提綱莊生言道在屎溺豈道果在屎溺耶然就屎溺而言亦可以見道道固無不在也是故諸書論大便亦因之以診病焉愚謂屎以得黃色之正者為中得乾溼之中者為常知其正則知其偏知其常則知其變矣設因飲食之殊而有形色之異亦其變之常也診之之法諸書以為暴注下迫皆屬於熱澄徹清冷皆屬於寒出黃如糜者腸中熱腸鳴滲泄者腸中寒濡泄者因於濕飧泄者傷於風糞如鶩溏者泄瀉之病大腸寒糞如羊矢者噎膈之病大腸枯如水傾下者屬濕完穀不化者為寒泄利無度者腸絕下利清穀者裡寒自利清水色純青者少陰病急下之證行其大便燥且結者胃家實下後之徵諸下血先便後血為遠血先血後便為近血從腸中來者其色紅從胃中來者其色黑白痢者屬乎氣赤痢者屬乎血便色白者大腸泄便膿血者小腸泄泄青白者大腸虛便腸垢者大腸實純下青水者風痢泄如蟹渤者氣痢黑如豆汁者濕痢黃如魚腦者積痢白如鼻涕者虛痢黑如雞肝者蠱疰痢五液注下痢兼五色者脾弱之證穀道不閉黃汁長流者腸絕之徵腹脹泄蛔者疳脹糞黑如狂者蓄血痢下蛔未死者胃氣未絕痢下蛔已死者胃氣將絕臥而遺屎不知覺者死病而大便如汙泥者死此皆因便以診病也然難經以入者為實出者為虛是則便閉者形氣雖不足而病氣有餘便泄者病氣雖有餘而形氣不足故標本病傳論曰先病而後泄者治其本先泄而後生他病者治其本小大不利治其標小大利治其本先小大不利而後生病者治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本傷寒論因之有急當救里急當救表焉合四診而觀之標本之分先後之辨其如示諸掌乎診溺望法提綱竊聞春夏氣行於外故汗多而溺少秋冬氣收於內故汗少而溺多然有飲水同飲之時又同而壯者溺少老者溺多何也蓋壯者如春夏之氣升多而降少老者如秋冬之氣降多而升少此其所以異也知其異以診其變則診其變可知其病焉診法維何閉癃者三焦實遺溺者三焦虛水泉不止者胱膀不藏也得守則生失守則死小便不通者膀胱不利也頭有汗則死頭無汗則生外感小便清者知不在裡仍在表也外感小便濁者知其在裡不在表也水液渾濁皆屬於熱澄徹清冷皆屬於寒溲便變者中氣不足小便數者腑氣有餘小便黃者小腹中有熱小便白者小腹中有寒濁赤而短者下焦實熱清白而長者下焦虛寒溺如黃柏汁者黃疸猶輕溺如皂角汁者黃疸已重尿變米泔者食滯溺如脂膏者腎消溺如血者血淋溺如膏者膏淋溺如沙石者石淋溺有餘瀝者氣淋病淋者頻欲小便痛澀滴瀝欲去不去欲止不止也白淫者思想無窮所願不得意淫於外入房太甚也是皆診溺之法也由是觀之遺閉者虛實之徵也清濁者表裡之徵也赤白者寒熱之徵也短長者邪正之徵也遺閉清濁赤白短長交推則虛實表裡寒熱邪正之變可知虛實表裡寒熱邪正交推則遺閉清濁赤白短長之變可知他如淋濁消疸諸證亦舉此而措之耳月經診法提綱素問曰女子二七而天癸至任脈通太衝脈盛月事以時下故有子七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子蓋天癸者女子之精月事者女子之血謂血為月事者以事應月也謂血為月經者以月為常也後人謂先期而至者為熱後期而至者為寒其實先期有虛實後期亦有虛實故先不可偏用寒後不可偏用熱而況有先後不定通閉無常者乎況有避年居季逆行暗行盛胎漏胎者乎然則就形色而診者是或一道也診之之法諸書以為依期消長為安血紅不結為正來去失時為弱色雜而凝為病濃而多者血盛淡而少者血衰赤而紫者屬熱淡而紅者屬虛陷經漏下黑不解者治用膠姜以其下寒也行經暴下血去多者則為奪血以其中虛也鮮紫而成塊成條者多由血熱黑敗而或散或摶者必屬虛寒成塊者氣之滯疼痛者血之凝行後作痛者為虛將行作痛者為實非時血下淋瀝不止者謂之漏下忽然暴下傾注不斷者謂之崩中至若如屋漏水如豆汁水者前人謂其病氣實而屬於濕吾直以為形氣虛而感於寒然必參之脈證合之形容以辨其虛實而判其寒熱焉若夫五崩之診王氏脈經以為白崩者形如涕赤崩者形如絳津黃崩者形如爛瓜青崩者形如藍色黑崩者形如衃血釋之者曰五色帶下傷肝則青如泥色傷心則赤如紅津傷肺則白如鼻涕傷脾則黃如爛瓜傷腎則黑如衃血五色各應五臟五臟俱虛五色並下是皆血之為病也愚謂帶之為病屬乎任經之為病屬乎沖而經色之分又當以紅紫辨寒熱濃淡分虛實鮮敗分新久六法合觀則紅紫濃淡鮮敗之變皆可交推以解而其寒熱虛實新久之變亦可錯綜而知第色雖屬望而理不容觀其將因問而得歟醫為司命尚其毋忽形體周身部位竊聞人之生也藉五行而化育仗四大以成形是故靈素視形容觀體態內則以臟分五行外則以形合五臟如肺合皮脾合肉心合脈肝合筋腎合骨皮者肺之部肉者脾之部脈者心之部筋者肝之部骨者腎之部皆以形體分臟腑也然臟腑之經絡運行於形體則形體之部位又當分臟腑之經絡謹按靈樞經脈篇曰肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下脾關抵伏兔下膝臏中下循脛外廉下足跗入中趾內間其支者下廉三寸而別下入中趾外間其支者別跗上入大趾間出其端脾足太陰之脈起於大趾之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨上廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側腎足少陰之脈起於小趾之下斜趨足心出於然骨之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下人迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還爪甲出三毛肝足厥陰之脈起於大趾叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺陰陽相貫如環無端其流溢之氣入於奇經轉相灌溉奇經凡八脈陰維陽維陰蹺陽蹺沖也任也督也帶也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝而上行於身之左右陰蹺起於跟中循內踝而上行於身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也於是乎因經絡以分部位按部位而知經絡或以經絡分臟腑或以形體分臟腑而凡證候之殊形容之異與夫痘疹癰疽一切病患皆可由是而察焉黃帝曰經脈者所以能決死生處百病調虛實不可不通諺曰不熟十二經絡開口動手便錯醫寄死生可不加之意乎身形望法提綱竊思診形之法必先知經絡之部位辨形體之淺深審其異同察其常變其病情乃可測焉何言之剛強者形氣有餘柔弱者形氣不足肥者常多血少氣瘦者常多氣少血心肺有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕風勝則動熱勝則腫燥勝則乾寒勝則浮身強痛者邪氣有餘身痿弱者正氣不足腫起者邪氣實陷下者正氣虛上腫曰風下腫曰水從上腫下者屬氣其邪在外從下腫上者屬水其邪在內先腫而後痛者形傷氣先痛而後腫者氣傷形無形而痛者陰之類有形不痛者陽之類無形而痛者其陽完而陰傷之也有形不痛者其陰完而陽傷之也此皆形之綱領也善診者推而極之變而通之按形體之淺深審部位之經絡合之氣色參之形容則其病雖異而其應不窮夫乃嘆靈素之中多活法岐黃以後少完醫否則率意而言執方而療欲其絲絲入扣滴滴歸原也難矣諺云取法乎上僅得其中若取法乎中豈不流於下乎而況學其下焉者乎身容望法提綱經言察觀病人之態以知精神魂魄之存亡然則臨證之際何可恃其脈息而不觀夫體態乎夫體以形言態以容言觀其體察其態斯病證明而病情著庶乎指有目而首有目焉其態維何陽證多語陰候無聲多語者易治無聲者難療罵詈笑歌其行日夜不休者狂態也直視僵仆其脈陰陽俱盛者癲態也厥者陰陽不足冒者表裡俱虛昏沉者陰陽虧而神氣少恍惚者津液亡而心血虛起臥不安反覆顛倒心中懊憹者虛煩之證衣被不斂言語善惡不避親疏者神亂之徵僵仆者屬乎陽病由機關不利傴僂者屬乎陰痛為心腎之疴如狂者血蓄膀胱熱結未瀉如醉者邪侵六腑閉塞不通妄言妄見者邪在於胃不識不知者邪入於腑默默然不慧者厥陰之候兀兀然欲吐者陽明之形倚息者氣逆而中不和懈惰者腎虛而胃不實身偏不舉者病在分腠之間指偏不用者病在經絡之內不可轉側者足少陽之實不能動搖者足少陰之虛不能自轉側者風濕相搏之容不能自收持者陰陽二維之病尻以代頭脊以代踵者腎痹之證登高而歌棄衣而走者胃實之形難以屈伸者風濕在於骨節難以俯仰者水氣在於腹中不能俯者病在陽不能仰者病在陰項不可以俯仰者足太陽之脈腰不可以俯仰者足少陽之經腰不可以行走項不可顧者少陽之厥腰不可以俯仰項不可顧者陽明之厥脊痛腰重形體不可翻身反覆者胃絕毛悴色夭腰脊不可俯仰屈伸者志傷此皆病人之態也而言其態者或在實義之中或在虛神之內或見於坐臥動作之際或著於皮肉筋骨之間善診者合五官之狀貌參四體之形容精乎靈素二書熟乎軒岐四診庶可豁然貫通焉內訓曰儀式刑之齊之則聖下之則賢否亦不失於從善誠哉有智婦人勝於男子形容望法大綱蓋聞人之生氣之聚也形者生之舍氣者生之元形無氣則壞氣無形則散形氣也者相須而不可離者也設有偏勝體態異焉總而言之其要有八曰動曰靜曰強曰弱曰俯曰仰曰屈曰伸八法交參則雖行住坐臥之際作止語默之間不外乎此診之之法以表裡言則動者強者仰者伸者為在表靜者弱者俯者屈者為在裡是容貌表裡之分也以陰陽言則動者強者仰者伸者皆屬陽靜者弱者俯者屈者皆屬陰是容貌陰陽之分也以寒熱分之則在表屬陽者多熱在裡屬陰者多寒是容貌寒熱之分也以虛實分之則陽道實陰道虛陽常有餘陰常不足是容貌虛實之分也然以表裡陰陽寒熱虛實八者合觀將動靜中各有俯仰強弱中各有屈伸而變化無窮則就動靜強弱俯仰屈伸八者合觀將表裡中各有寒熱陰陽中各有虛實而變化亦無窮且夫動靜交相養也強弱交相濟也俯仰屈伸交相為用也得其中則之八者皆不可言病不得其中則之八者皆可言病然而中無定體病不易言蓋天有寒暑人有陰陽體有勞逸年有老少寒則多屈熱則多伸陰則多俯陽則多仰勞則多強逸則多弱少則多動老則多靜而況老少勞逸陰陽寒暑又皆有動靜強弱之殊俯仰屈伸之辨乎然則天之於寒暑也人之於陰陽也體之於勞逸也年之於老少也四者果能隨時以處中方可因證而知病不然將以常為變以變為常未識厥中焉知允執其不顛倒也者幾希行止動靜提綱人身一太極也太極一陰陽也診法之分動靜猶太極之分陰陽也太極動而生陽靜而生陰猶人身之動屬乎陽靜屬乎陰也動以行言靜以止言行有遲速止有屈伸猶太極之分兩儀兩儀之分四象也由是而剛柔得位動靜有常論陰陽則無咎論身體則無病矣然而陰陽有偏勝之時身體有違和之日故聖人測陰陽於氣候驗病症於形容就行而言則速為陽遲為陰行之速者陽之陽行之遲者陽之陰就止而言則伸為陽屈為陰止之伸者陰之陽止之屈者陰之陰陰陽之要有表裡焉有臟腑焉陽入之陰則靜陰出之陽則怒重陰者癲重陽者狂以寒熱分之則陽多熱陰多寒以虛實分之則陽道實陰道虛陽經之病實則見其棄衣而走虛則見其身重難行陰經之病實則見其坐而欲起虛則見其臥而卷身陽主乎動行之速者陽有餘行之遲者陽不足陰主乎靜止之伸者陰有餘止之屈者陰不足欲動而不能動者其病在陽欲靜而不能靜者其病在陰乍靜乍亂水漿不入形體不仁者陰陽離散時動時靜容止可觀進退可度者血氣調勻善診者觀動靜之常以審動靜之變合乎望聞問切辨其寒熱虛實化而裁之推而行之可謂知陰陽矣診坐望法提綱嘗思觀形容者非但欲診之於行抑且欲診之於坐苟能心領神會雖一動一靜莫不有昭著者焉間嘗驗之於病見有坐而仰者坐而伏者坐而叉手冒心者坐而以手護腹者以及坐而下一腳坐而掉兩手或坐而不得眠或眠而不得坐者由是稽之於古則謂坐而仰者肺實實則胸盈仰息坐而伏者肺虛虛則伏而短氣叉手冒心者汗後血虛以手護腹者裡實心痛其坐而下一腳者腰痛之貌坐而掉兩手者煩躁之容但坐不得眠眠則氣逆者咳嗽肺脹但眠不耐坐坐則昏沉者血奪氣虛其他坐不能起者陰經之證立不能坐者陽病之徵坐而欲起者陰氣實坐不欲起者陽氣虛轉側不能者痿痹之狀坐臥不定者煩躁之形是皆顯而易見者也然合五官而察之合五體而辨之其坐臥之間形容之變竟有難於言傳者矣是篇舉其一隅導夫先路至若聽聲寫形尚有待於來者診臥望法提綱在昔聖賢之於望也不惟欲觀其行止抑且欲省其衷懷故雖寤寐之間鑑察之下亦有診法存焉蓋嘗以是論之臥之狀有多睡者無睡者但欲寐者不得眠者轉側不能者起臥不安者其形又有仰伏舒捲之殊內外左右之異稽之於古以為多睡者脾虛無睡者胃實但欲寐者少陰之證不得眠者陽明之徵轉側不能者風濕相搏起臥不安者腹滿心煩臥不得安者胃中不和坐不得臥者肺中氣逆其睡而仰者屬乎陽睡而伏者屬乎陰不得正偃者胃不和而肺氣實但欲伏眠者腹中痛而肝氣虛仰而舒足者小腸之證仰而卷足者腎臟之徵舒為陽卷為陰舒而不欲卷者陽經實熱卷而不欲舒者陰經虛寒睡向內者屬陰是熱已去而正虛睡向外者屬陽是熱未去而邪實腰痛左臥卷左足而痛減者病在左腎右臥卷右足而痛減者病在右腎痛在肝者屬左脅故左著床則更痛痛在脾者屬右胠故右著床則更痛病在肺之左者宜於左病在肺之右者宜於右其肺癰生於左者右臥則更痛生於右者左臥則更痛其水病左半著床則左半身愈腫右半著床則右半身愈腫此皆臥診之大略也合形狀而觀之不有可見者乎若夫因脈證而異因氣色而異又當參之四診辨其三因庶乎標本明而虛實判不至以不平平之矣身容四法提綱臨症之際已視其形容觀其坐臥矣然有法焉不拘於行住坐臥難列於俯仰屈伸屈指而計之其綱有四曰𠘧𠘧曰振振曰戰曰慄𠘧𠘧者何項背強𠘧𠘧然猶短羽之鳥欲飛而不能飛也振振者何身體動振振然若聳悚之容欲定而不能定也戰則身為之搖矣戰之與振振輕而戰重也慄則心為之戰矣慄之與戰戰外而慄內也故其為病也𠘧𠘧者太陽實甚則有臥不著席之形振振者元氣虛甚則有身欲擗地之狀戰者其人本虛邪在外而正與之爭正勝其邪故勢順而易解慄者其氣愈微邪入內而正與之爭邪勝其正故勢逆而難瘳且𠘧𠘧者太陽實其證有有汗無汗之分振振者太陽虛其證有汗前汗後之辨戰在外太陽之所屬也身溫汗出邪斯退矣慄在內少陰之所主也身寒肢厥邪則陷焉故凡臨症之際雖分觀以審其常必合論以通其變蓋不但不知其法者不可為醫即知其法而泥於法或知其法而離於法亦皆不可為醫也經曰能合色脈可以萬全斯誠活法也已意態望法提綱望診之法既觀身體視形容矣然有時雖見於身體之外實著於意態之間又當存心省察以診其病焉析而言之有因人之好惡者有因時之寒暑者有因體之寒熱者何謂因人之好惡五十一難曰病有欲得溫者有欲得寒者有欲見人者有欲不見人者而各不同病在何臟腑也然病欲得寒而欲見人者病在腑也病欲得溫而不欲見人者病在臟也何以言之腑者陽也陽病欲得寒又欲見人臟者陰也陰病欲得溫又欲閉戶獨處惡聞人聲故別知臟腑之病也是蓋以寒熱分陰陽以陰陽分臟腑也推之於喜明屬陽者元氣實喜暗屬陰者元氣虛以及喜熱飲寒飲惡熱飲寒飲可廣其好惡之意也何謂因時之寒暑傷寒論曰夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身推之於夏月惡熱者知其陽氣勝冬月惡寒者知其陰氣勝以及春秋之惡寒惡熱喜寒喜熱可廣其寒暑之意也何謂因體之寒熱傷寒論曰病人身大熱反欲得近衣被者熱在皮膚寒在骨髓也身大寒反不欲近衣被者寒在皮膚熱在骨髓也推之於身熱不欲近衣被者則知骨髓不寒身寒欲近衣被者則知骨髓不熱以及外無寒熱欲近衣被者骨髓寒外無寒熱不欲近衣被者骨髓熱而凡衣多惡熱衣少畏寒之常衣少惡熱衣多惡寒之變亦可廣其寒熱之意也是皆見於意態之間著於身體之外可不存心省察以診其病歟醫書汗牛充棟何須禍棗災梨然余有不能已於言者何則炎黃之書其旨深遠漢晉之書其文缺略醫家因陋就簡遂推趨時者為大名家病家聞譽即延亦信趨時者為真實學自是術愈疏方愈亂病不至死而醫死之醫不欲誤而書誤之安得岐黃復起明其道以辨其非耶是用忘其狂瞽著述遵經非惟欲醫家以是診病亦欲病家以是試醫且不欲醫病之家以是遵我亦欲醫病之家以是遵經果爾則雖禍棗災梨或未必無小補
