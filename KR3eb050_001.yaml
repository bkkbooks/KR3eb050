body:
  text: 卷上診法常以平旦靈素談醫妙入神窮源探本在清晨時平可辨邪和正法定能分假與真有疾音容俱轉變無疴色脈自調勻常經萬世皆師範診視須當永奉遵原夫昧爽方興天道之陰陽中正黎明甫啓人身之志氣清靈觀形以驗溫涼平能合度察色而瞻動靜法不離經斯時也九候無差五音悉准有過易窺有偏易診辨三因之虛實氣色分明察五臟之盛衰精神平允見微知著固能判斷吉凶原始反終更足周知生殞蓋觀日以揣摩亦援天而指引由是參病情稽診法指下融通心中浹洽脈息共形容合論推究無窮聲音與氣色交參變通不乏譬若權衡正直觀俯仰而較錙銖亦如尺度均同計毫釐以分闊狹況乎因人潔矩候氣平章不似日中之溫暖不同夜半之清涼營衛會於脈口氣色見於明堂有證皆顯無隱弗彰經絡均勻按法真堪處變規模宏遠持平可以為常爾乃觀其所由視其所以或端本以澄源或因此而識彼寒多熱少分臟腑之盈虧暮重朝輕析陰陽之表裡故察人情觀日晷時行則行時止則止即從權而診視不執其經然觸類以引伸難逾厥旨若夫金烏返照玉兔騰精病因時而進退氣隨日以流行有平脈時脈有正聲變聲診或違夫晝夜治即昧於重輕是則望聞問切之方皆失其正補瀉迎隨之法不得其平於是聖人著作內經申明平旦合四診而同觀會三才以參看有為有守廣宇內之栽培無黨無偏協時中之條貫是以德邁羲農功高霄漢宜其達四海以謳歌歷千秋而燦爛不然何以為醫學之範圍妙化育而參贊望色常宜定靜平明診法已敷陳望色還須氣息勻更待伊人心志定聆音察理論精神扶持當緩緩言語莫頻頻坐臥情和洽寒溫服適均醫家看視宜恬靜鄰里瞻觀慢博詢休談長與短應辨假和真成敗所關死生攸寄脈息豈無隱微聲音亦有同異神凝志一始能融會貫通理明義精方可引伸觸類臟腑之情蘊奧安可粗心氣色之道精深不容率意若乃晨昏昧昧樓閣蔥蘢或敷脂粉兮汙其顏色或居帷幔兮蔽其形容慢言三折其肱揣摩弗確即使十全之技看視無從卻愁倉卒又持燈尤恐奔波多亂目俗醫治病還道這氣色朦朧無甚差錯咦縱然倣佛分虛實只在依稀想像中明堂周身部位欲觀氣色先識明堂欲察明堂先知部位首面上於闕庭王宮在於下極五臟次於中央六腑挾其兩側靈樞曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方下者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也男女異位男子色在面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也此面王之部男女之分也所謂明堂者鼻也庭者顏也闕者眉間也面王者鼻準也下極者闕庭之下兩目之中也頰外謂之繩膝蓋謂之臏口旁大紋為巨分頰下曲骨為巨屈也色之見於明堂猶脈之出於氣口也氣口者血脈之大會明堂者呼吸之宗氣也氣口明堂其義一也明堂六部提綱明堂望法有五臟之分有六部之辨六部者中央臟腑之部為內四旁肢節之部為外橫分之為上下豎分之為左右也以內外言之色見於內部者其病在內色見於外部者其病在外色從外部走內部者其病自外走內色從內部走外部者其病自內走外內者重外者輕從內走外者臟傳腑腑傳表由重而輕也從外走內者表傳腑腑傳臟由輕而重也此內外之辨也以上下言之色見於上部者其病在上色見於下部者其病在下色從下部走上部者其病自下走上色從上部走下部者其病自上走下上為陽下為陰陽病者上行極而下陰病者不行極而上陽病自上走下為重自下走上為輕陰病自下走上為重自上走下為輕此上下之辨也以左右言之色見於左部者其病在左色見於右部者其病在右色從右部走左部者其病自右走左色從左部走右部者其病自左走右左為陽右為陰男子左為逆右為從女子右為逆左為從男子自左走右為從自右走左為逆女子自右走左為從自左走右為逆此左右之辨也由是而五色交錯六部合參則又各有行走各有逆從是必察其色之所起辨其色之所向以推其順逆而斷其吉凶焉然其色之行走於意云何蓋其色上鋭者其行上向其色下鋭者其行下向在左右如法而內外亦然矣此六部之提綱也岐伯曰臟腑之在中也各以次舍左右上下各如其度也其斯之謂歟面貌分應臟腑既察明堂之部位當觀面貌之部位蓋內經望法有因明堂而分者有因面貌而分者何則臟腑經絡相通表裡上下相貫血氣周流無有間斷以故氣色見於明堂即以明堂分臟腑氣色見於面貌即以面貌分臟腑刺熱篇曰肝熱病者左頰先赤肺熱病者右頰先赤心熱病者顏先赤腎熱病者頤先赤脾熱病者鼻先赤此熱病之臟部也熱病從所部而起者至期而已言至其氣正之時日而愈也推而論之則熱病之死生間甚時日之王相休囚皆可按法而究焉然又言少陽之脈色榮頰前太陽之脈色榮顴骨則是以頰前為少陽之部以顴骨為太陽之部矣其曰榮未交者是病未傳也則榮已交者是病已傳也視其交於何部而斷其傳於何經也設或色見少陽之部診得少陰之脈或色見太陽之部診得厥陰之脈此為陰陽爭見表裡皆病所謂兩感者是已不言陽明者缺文也夫陽明之脈起於鼻絡於目交頞中挾口環唇下交承漿卻循頤後下廉出大迎循頰車故其為病也身熱目痛而鼻乾不得臥如經云面熱者足陽明病仲景云陽明病面合赤色是皆可為陽明之診也更有腹脅膈之分焉所謂頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也此皆部位之分病色之辨也皮肉血氣筋骨亦各有分部焉靈樞曰色起兩眉薄澤者病在皮唇色青黃赤白黑者病在肉營氣濡然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢者病在骨蓋以五臟之屬分五形之部也若夫風病之診又不同心風診在口其色赤肝風診在目下其色青肺風診在眉上其色白脾風診在鼻上其色黃腎風診在肌上其色黑凡若此者務須沉潛反復融會貫通病雖變出多端醫者常若可見庶乎其不瘥矣至於幼科五臟之部痘科八卦之位蓋因內經諸法隱其文彰其義耳能精乎此亦可觸類旁通矣肌上之肌高士宗作𦠄𦠄頰肉也宜從之五官分應五臟既知面貌分五臟當知五官分五臟何則天有六氣降生五味發為五色徵為五聲淫生六疾故周禮疾醫以五味五穀五藥養其病以五氣五聲五色視其死生兩之以九竅之變參之以九臟之動是以內經望法以五色分五行以五官分五臟於是乎診於面則面有五臟之分診於竅則竅有五臟之別蓋無往而非五臟之所屬亦無往而非五行之所屬也且五官者五臟之閲也經曰十二經脈三百六十五絡其血氣皆上於面而出空竅其精陽氣上出於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於味走唇舌而為味鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑釋之者曰鼻白肺病也色深白喘而胸滿者邪實也色淺白喘而不滿者正虛也目眥青肝病也色深青者邪實也色淺青者正虛也唇黃脾病也色深黃者邪實也淺黃者正虛也舌赤卷短心病也色深赤焦卷者邪實也色淺紅滋短者正虛也耳黑腎病也色深黑者邪實也色淺黑者正虛也蓋以淺淡為虛深濃為實因五官以分五臟也然五官之分有視形容之法焉有觀氣色之法焉或因形容分五臟或因氣色分五臟則又各有提綱各有條目詳述於後可以參觀所謂耳目不違心結諸心形諸色也夫形色之理陰陽之道也陰陽也者合之則臟腑經絡具一陰陽也分之則耳目口鼻各一陰陽也身體之大毫髮之微莫不有形色之理焉莫不有陰陽之道焉邵子所謂物物具一太極者可不引之相發明哉五色分應五臟既知五官分五臟當知五色分五臟蓋人者天地之心也五行之端也食味別聲被色而生者也故經云以五色命臟青為肝赤為心黃為脾白為肺黑為腎肝合筋心合脈脾合肉肺合皮腎合骨故青病在筋赤病在脈黃病在肉白病在皮黑病在骨蓋以色應臟以臟合形也然或察部以言臟或察色以言臟亦猶診脈之法或以氣口寸關尺分五臟或以弦鉤代毛石分五臟夫弦鉤代毛石者五臟之氣見於血脈也青赤黃白黑者五臟之氣見於氣色也五臟之氣見於氣色因以氣色分五臟五臟之氣見於明堂因以明堂分五臟此活法也亦定法也至若以氣色分臟腑則浮澤為外病當屬腑沉濁為內病當屬臟若更合氣色部位分臟腑則色見於臟部者其色深濃當為臟氣有餘之病其色淺淡當為臟氣不足之病見於腑部者其色深濃當為腑氣有餘之病其色淺淡當為腑氣不足之病故以陰陽言則臟陰也腑陽也色見諸陰者臟病也見諸陽者腑病也察其何部何色而斷其何臟何腑也舉凡皮肉血脈筋骨亦以氣色部位分之矧氣色有陰陽部位有陰陽臟腑病症又各有陰陽參而伍之錯而綜之可以象求難以數推矣相氣十法提綱大凡望診先分部位後觀氣色欲識五色之精微當知十法之綱領十法者浮沉清濁微甚散摶澤夭是也何謂浮沉色顯於皮膚間者謂之浮隱於皮膚內者謂之沉浮者病在表沉者病在裡初浮而後沉者病自表而之裡初沉而後浮者病自里而之表此以浮沉分表裡也何謂清濁清者清明其色舒也濁者濁暗其色慘也清者病在陽濁者病在陰自清而濁陽病入陰自濁而清陰病轉陽此以清濁分陰陽也何謂微甚色淺淡者謂之微色深濃者謂之甚微者正氣虛甚者邪氣實自微而甚則先虛而後實自甚而微則先實而後虛此以微甚分虛實也何謂散摶散者疏離其色開也摶者壅滯其色閉也散者病近將解摶者病久漸聚先摶而後散者病雖久而將解先散而後摶者病雖近而漸聚此以散摶分久近也何謂澤夭氣色滋潤謂之澤氣色枯槁謂之夭澤者主生夭者主死將夭而漸澤者精神復盛先澤而漸夭者血氣益衰此以澤夭分成敗也蓋十法者辨其色之氣也五色者辨其氣之色也氣者色之變色者氣之常氣因色而其理始明色因氣而其義乃著氣也色也分言之則精微之道顯合觀之則病症之變彰此氣色之提綱也經曰相氣不微不知是非屬意弗去乃知新故其是之謂乎望法陰陽總綱明堂察色以臟腑部位為體以氣色診法為用故分觀之可以識其常合參之可以通其變然究其常變而原其始終要不離乎陰陽之旨蓋陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故以五色分言之青屬少陽旺於春赤屬太陽旺於夏白屬少陰旺於秋黑屬太陰旺於冬黃屬中央土寄於四季旺於長夏以六部分言之外者上者左者皆為陽內者下者右者皆為陰以十法分言之浮清甚散澤為陽沉濁微摶夭為陰於是乎氣色兼見部位互考則陰陽相錯陰中有陽陽中有陰此陰陽之總綱也顧陰陽之道陽清陰濁陽升陰降陽熱陰寒陽動陰靜陽外陰內陽上陰下陽左陰右陽道實陰道虛陽常有餘陰常不足是以色見諸陽者易治見諸陰者難療外感陰病見陽色者易治陽病見陰色者難療內傷陽病見陰色者易治陰病見陽色者難療凡此陰陽之理既可合氣色部位以相參亦可合臟腑病症以相證者也易傳曰一陰一陽之謂道陰陽不測之謂神內經曰得神者昌失神者亡陰陽變化一以貫之矣五色相應提綱嘗考內經望法以為五色形於外五臟應於內猶根本之與枝葉也色脈形肉不得相失也故有病必有色內外相襲如影隨形如鼓應桴遠者司外揣內近者司內揣外五色之見莫不相輸應焉何言之肝屬東方木通於風氣在時為春在竅為目在志為怒在變動為語其藏魂其脈弦其聲呼其音角其臭臊其味酸其液泣其合筋其榮爪其腑膽其日甲乙其時寅卯其經足厥陰此青色之應也心屬南方火通於暑氣在時為夏在竅為舌在志為喜在變動為噫其藏神其主血其聲笑其音徵其臭焦其味苦其液汗其合脈其榮色其腑小腸其日丙丁其時巳午其經手少陰其包絡手心主此赤色之應也脾屬中央土通於濕氣在時為長夏在竅為口在志為思在變動為吞其藏意其脈緩其聲歌其音宮其臭香其味甘其液涎其合肉其榮唇其腑胃其日戊己其時辰戌丑未其經足太陰此黃色之應也肺屬西方金通於燥氣在時為秋在竅為鼻在志為悲在變動為咳其藏魄其主氣其脈毛其聲哭其音商其臭腥其味辛其液涕其合皮其榮毛其腑大腸其日庚辛其時申酉其經手太陰此白色之應也腎屬北方水通於寒氣在時為冬在竅為耳在志為恐在變動為缺其藏志其脈石其聲呻其音羽其臭腐其味鹹其液唾其合骨其榮發其腑三焦膀胱其日壬癸其時亥子其經足少陰此黑色之應也色之應乎臟者亦應其腑應乎腑者亦應其經但當分其部位之內外察其氣色之陰陽五色之見莫不相輸應焉顧應者常也不應者變也知其常變則知其生克矣知其生克則知其逆從矣五臟各有病證聲色臭味當與氣口明堂相應焉其太過不及相生相剋者皆病也從外知內蓋本乎此五色主病提綱竊思經言見其色知其病命曰明非特明其色且明其病也亦非特明其色明其病且明其病之應乎色色之主乎病也何以言之肝色青心色赤脾色黃肺色白腎色黑肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之氣逆則頭痛耳聾不聰頰腫心病者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰相引而痛脾病者身重善肌肉痿行善瘈腳下痛虛則腹滿腸鳴飧泄食不化肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂此五臟之病證五色之所主也肝合膽心合小腸脾合胃肺合大腸腎合三焦膀胱膽病者寒熱善太息口苦嘔宿汁心下淡淡恐人將捕之小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱胃病者腹䐜脹胃脘當心而痛上肢兩脅膈咽不通食飲不下大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外廉及脛踝後皆熱此六腑之病證五臟之所合也析而言之臟主裡腑主表色之沉者病在裡色之浮者病在表是臟腑表裡之分也臟為陰腑為陽色之濁者病在陰色之清者病在陽是臟腑陰陽之分也臟有虛實腑有虛實色之淺淡者為虛色之深濃者為實是臟腑虛實之分也如是而知臟腑之為病氣色之所主亦可見其色知其病矣然而有時相應有時不相應何也蓋臟腑有盛衰氣色有生克太過則薄所勝而乘所不勝其不及則所勝妄行而所生受病所不勝薄之也靈樞曰腎乘心心先病腎為應色皆如是是則一隅三反亦可推測而知此皆主病之提綱也善肌肉痿千金肌作飢甲乙作苦飢肌肉痿部色主病提綱既知氣色之主病當知部色之主病夫而後可因部位氣色之所主以言臟腑經脈之所病謹按靈樞經脈篇曰肺手太陰之脈是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩臂痛風寒汗出中風小便數而缺氣虛則肩臂痛寒少氣不足以息溺色變為此諸病大腸手陽明之脈是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病胃足陽明之脈是動則病灑灑振寒善呻數缺顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者瘧狂溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病脾足太陰之脈是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病心手少陰之脈是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病小腸手太陽之脈是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病膀胱足太陽之脈是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病腎足少陰之脈是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病心主手厥陰心包絡之脈是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病三焦手少陽之脈是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者目鋭眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病膽足少陽之脈是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病肝足厥陰之脈是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病此皆經脈之病也經脈十二外絡形骸內通臟腑故其為病或見於形容或見於氣色形容有部氣色有部或因形容知其病或因氣色知其病是皆主病之謂也舉痛論曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也夫明堂四體面貌五官與夫經絡之所行形層之所屬固盡五臟六腑之部也明察乎是言病其庶幾乎四時望法相參凡觀五色之殊當審四時之變經曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓氣之內外既因乎時色之浮沉當因乎氣故可以氣之內外而知其色之浮沉亦可以色之浮沉而知其氣之內外然浮沉若是而氣色何如蓋嘗聞之天有五行分時化育以成萬物春肝木旺其色當青若甚而浮清是謂太過病在外微而沉濁是謂不及病在內春以澤為本春時色青如以縞裹紺曰平青多澤少曰病但青無澤如草滋曰死夏心火旺其色當赤若甚而浮清是謂太過病在外微而沉濁是謂不及病在內夏以澤為本夏時色赤如以縞裹朱曰平赤多澤少曰病但赤無澤如衃血曰死長夏脾土旺其色當黃若甚而浮清是謂太過病在外微而沉濁是謂不及病在內長夏以澤為本長夏色黃如以縞裹栝蔞實曰平黃多澤少曰病但黃無澤如枳實曰死秋肺金旺其色當白若甚而浮清是謂太過病在外微而沉濁是謂不及病在內秋以澤為本秋時色白如以縞裹紅曰平白多澤少曰病但白無澤如枯骨曰死冬腎水旺其色當黑若甚而浮清是謂太過病在外微而沉濁是謂不及病在內冬以澤為本冬時色黑如以縞裹紫曰平黑多澤少曰病但黑無澤如煤炲曰死凡此四時之色得其平則不病不得其平則病者亦猶脈之太過實強病生於外不及虛微病生於內也然當其時而見其色者常也非其時而見其色者變也變或先時而見後時而退者為太過後時而見先時而退者為不及太過則薄所勝而乘所不勝其不及則所勝妄行而所生受病所不勝薄之也以生克言之色生時者為虛邪時生色者為實邪色克時者為賊邪時克色者為微邪色時相應者為正邪五色之見可比例而推也時日支幹孤虛旺相亦可按法而究焉第病症有三因氣色有十法又當參伍以通其變矣若夫非其時而有其氣如冬應寒而反溫夏應熱而反涼或時已至而氣未至或氣已至而時未至或至而太過或至而不及氣色與之相應者順時者也不相應者逆時者也此又四時五色之變其太過不及可候氣而參觀也夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之色脈乃可言間甚之時死生之期也此皆四時之要也四時氣色主病既知四時之色須知四時之病知四時之病以察四時之色夫而後可按四時之色以言四時之病其病維何玉機真藏論曰春脈如弦太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿夏脈如鉤太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄秋脈如浮太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音冬脈如營太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變脾脈者中央土孤臟以灌四旁者也太過則令人四肢不舉其不及則令人九竅不通名曰重強此皆四時之病也然此四時之病內經以脈言而吾以色言者何哉蓋嘗讀內經而有悟於岐黃之言焉岐伯曰夫色脈與尺脈之相應也如桴鼓影響之相應也不得相失也色之變化以應四時之脈此上帝之所貴以合於神明也黃帝曰吾得脈之大要天下至數五色脈變揆度奇恆道在於一由此觀之四時氣色之生克亦可以臟腑經脈之病症比例而推矣何也五臟之病四時之色推之以五行之理太過則薄所勝而乘所不勝其不及則所勝妄行而所生受病所不勝薄之也設或知病而不知診或知診而不知病則雖能知診雖能知病而究不知診病即能知診病而尚不知治病而況尚不知診尚不知病耶嗚呼靈素之書若此其詳也診治之法若此其備也然而無有乎爾則亦無有乎爾善忘之忘宋林億等較正千金素問皆云當作怒今考素問氣交變大論亦作怒宜從之晝夜陰晴相參既講春夏秋冬之異須知晝夜陰晴之殊蓋人在氣交之中與氣候之相應也猶影之隨身猶水之鑑形夫是故晝為陽衛氣日行於陽夜為陰衛氣夜行於陰天溫日陽則人血淖溢而衛氣浮天寒日陰則人血凝泣而衛氣沉血氣營衛之相應如此則色之相應可徵矣何者脈以應月色以應日晝則氣行於陽色之見也當光輝而外映夜則氣行於陰色之見也當明潤而內含晴則氣熱熱則氣淖澤淖澤則黃赤陰則氣寒寒則血凝泣凝泣則青黑此皆其應也色之應乎晝夜陰晴者常也不應乎晝夜陰晴者病也夫百病多以旦慧晝安夕加夜甚色當因病之旦慧晝安夕加夜甚也其或暮輕朝重夜減晝加則不在乎衛氣而獨主乎臟氣矣是必以臟氣之所不勝時者甚以其所勝時者起夫所不勝者克我者也所勝者我克者也蓋以一日分為四時以四時分應五臟肝日甲乙其時寅卯心日丙丁其時巳午肺日庚辛其時申酉腎日壬癸其時亥子脾日戊己其時辰戌丑未以五臟之日時合五臟之病色其生克之理間甚之候死生之期胥於是乎推亦於是乎斷矣然而一日之內一時之間寒暄不齊雨暘靡定則又各有所勝各有所不勝矣若夫宮室有冷暖之殊衣服有寒溫之異病或因之而重輕色或因之而損益雖不當以晝夜論亦皆可作陰晴觀觸目關心存乎人矣五方望法相參夫人之有是身也資始於天資生於地稟精氣以成形藉陰陽而賦命顧天地有五方之殊斯氣化有五行之異風土於焉而變氣色由是而分矣經曰東方之人多青南方之人多赤西方之人多白北方之人多黑中央之人多黃此相應之謂也然相應者色之常不相應者色之變或常或變而無過不及者平色也或常或變而有過不及者病色也要之天包地外地在天中天氣勝地氣為順地氣勝天氣為逆五色之見或不合乎五方之正色而合乎四時之平色者常也承天而時行地道也不合乎四時而與聲音脈症相生者病之順者也不合乎四時而與聲音脈症相剋者病之逆者也五色之變可比例而參觀也析而言之一方之間一邑之內地形有高下則風氣有寒溫地形有燥濕則風氣有剛柔風氣既感於中形色必應於外是故堅土之人剛弱土之人柔壚土之人大沙土之人細息土之人美㘪土之人醜山林之民毛而方得木氣多也川澤之民黑而津得水氣多也丘陵之民專而長得火氣多也墳衍之民皙而瘠得金氣多也原隰之民豐肉而痹得土氣多也望其容貌瞻其顏色近者小異遠者大異皆可以風氣之寒溫而知其色脈之常變焉以色脈之生克而知其病症之順逆焉凡四海之大十室之小苟有諸中必形諸外准其情察其理相其勢度其時引而伸之觸類而長之風土雖變氣色雖異豈能外乎五行哉散之在理則有萬殊統之在道則無二致矣氣質望法相參夫色之同於衆人者氣候之常而不同於衆人者賦稟之變故夫氣質不齊形色亦異經曰木形之人青土形之人黃火形之人赤金形之人白水形之人黑蓋其賦稟獨盛故其氣色獨著也然五形之人其臟腑之盛衰骨節之大小筋之粗細肉之堅脆皮之厚薄血之清濁氣之滑澀脈之長短血之多少經絡之數營衛之度又各不齊擴而充之則人心之不同如其面焉豈僅陰陽五人五五二十五人而已哉變化蓋無窮矣是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣參之四時合之五行可以推其生克斷其吉凶矣四診心法云五臟之色隨五形發見百歲不變者主色也四時之色隨四時加臨推遷不常者客色也主色人氣之所生客色歲氣之所化歲氣勝人氣為順人氣勝歲氣為逆所謂逆者春當青而反白秋當白而反赤夏當赤而反黑冬當黑而反黃長夏當黃而反青可隨時而觀也夫色之生於心也體天地法四時則陰陽順人情豈特一端而已哉夫各有所當也老少望法相參夫色之不能一致者氣質之變也而亦有老少之殊方其少也血氣盛肌肉滑氣道通營衛之行速及其老也血氣衰肌肉枯氣道澀營衛之行遲夫是故老者之色多憔悴少者之色多潤澤也經曰人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛已平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰善憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魂魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣蓋五十以前五臟相生而日長五十而後五臟相減而日消此天年之常也然有年已老而體未衰者有年方壯而形先槁者雖強弱之不齊亦盛衰之各異爾要之盛於中者必著於外衰於裡者必形於表故望其形色之盛衰即可知其臟腑之盛衰臟腑形色猶根本之與枝葉也此老少之同異可一隅而反三也居養望法相參形志苦樂不同氣體居養各異老少強弱既講富貴貧賤須詳藜藿之家原難例於肉食文繡之體豈可比之布衣貧賤者形容枯槁面貌黧黑因受酷熱嚴寒之困富貴者身體柔脆肌膚肥白緣處深閨廣廈之間此居養之不齊而氣色所由異者也或謂富貴多虛其治宜補貧賤多實其治宜攻殊不知道貴融通虛實勿拘於黑白法嫌執滯補瀉宜察其淺深況乎勞其筋骨餓其體膚貧賤恆多空乏食必大牢出必乘車富貴豈少強盛哉是故治療之則必審其因診視之方當觀其證五官面貌無不變色易容二便均調要皆舍標從本見於面盎於背生色根心察其理聆其音誠中形外用是見微知著因此識彼證治本於岐黃針灸循其規矩湯遵仲景博採衆方藥效神農參觀本草此聖人之遺範實醫士之格言也變色望法相參望診之法有天道之殊有人事之變故凡欲知病色必先知常色欲知常色必先知常色之變欲知常色之變必先知常色變中之變何則飲酒者脈滿絡充故目紅息粗而色赤肝浮膽橫故趾高氣揚而色青食入於陰氣長於陽故飽食者血華色而益澤飢則氣衰甚則氣少故腹餒者色澤減而少氣奔走於風雪中者寒侵肌表故色青而閉塞奔走於暑日中者熱襲皮膚故色赤而浮散房勞者精氣下泄故目下色青用力者血氣上趨故面上色赤久臥傷氣面則壅滯未睡傷血色或浮赤怒則肝氣逆故悻悻然目張毛起而面蒼愧則心氣怯故赧赧然顏慚汗出而面赤思則氣結於脾故瞼定而色黃以澀喜則氣發於外故頤解而色紅且散悲則氣消於內故五臟皆搖色澤減而聲噍以殺憂則氣並於中故兩眉雙鎖色沉滯而氣鬱以塞恐懼者精神蕩憚而不收故色脫而面白驚怖者血氣分離而乖亂故氣促而面青此皆常色變中之變固可因其氣色未定而知之然必待其氣色已定而診之知其常色變中之變可診其病色變中之變矣望色先知平人凡欲知病色必先知平色蓋平人之色不浮不沉不清不濁不微不甚不散不摶光明潤澤血華其色也五臟生成篇曰生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也夫縞者白絹也絹之白猶膚之白也絹之光明潤澤猶膚之光明潤澤也光明者神氣之著潤澤者精血之充其曰朱謂其色之正赤也曰紅謂其白之間赤也曰紺謂其青之間赤也曰栝蔞實謂其黃之間赤也曰紫謂其黑之間赤也赤者血色也縞者膚色也其青赤黃白黑雖不同要皆有血色之赤以間乎其中焉膚色之白以包乎其外焉惟此硃紅紺紫者隱於膚之內而光明潤澤者顯於膚之外故曰如以縞裹蓋五色之著欲其間見不欲其獨呈欲其合於中不欲其露於外也五臟之所生也四時之所成也氣血華其色精神彰於面焉此所謂平人也平人者何無病者也知其平之為無病可知其不平之為病矣色以潤澤為本蓋聞博以窮理約以知要色脈之變雖有萬殊理義之旨初無二致特不求其本斯散而無紀矣何則靈素論脈以胃氣為本望色以潤澤為本凡診脈有胃氣者生無胃氣者死凡望色潤澤者生沉夭者死然則色之潤澤豈非猶脈之胃氣乎經言青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也以其血色雖變而猶有潤澤也青如草滋者死黃如枳實者死黑如煤炲者死赤如衃血者死白如枯骨者死此五色之見死也以其血色已變而更無潤澤也夫潤澤之有無猶胃氣之有無也蓋脈之胃氣脈之神也色之潤澤色之神也脈貴有神色亦貴有神也色脈雖殊其源無二實決死生之大要察病症之先務因舉一言以蔽之曰色以潤澤為本蓋潤澤者血氣之榮光明者潤澤之著有血氣即有潤澤有潤澤即有光明也夫光明潤澤者氣也青赤黃白黑者色也有氣不患無色有色不可無氣也合言之而氣色之見不可離分論之而氣色之辨不可混何也脈以胃氣為本色以潤澤為本法異而理同也五色交錯合參竊謂五色交錯有分見者焉有間見者焉生克於是乎推吉凶以此而斷所謂分見者六部之色彼此不同也如青赤分見赤黃分見黃白分見白黑分見黑青分見此色之相生者也青黃分見黃黑分見黑赤分見赤白分見白青分見此色之相剋者也所謂間見者五色之著彼此相乘也如青赤間見赤黃間見黃白間見白黑間見黑青間見此色之相生者也青黃間見黃黑間見黑赤間見赤白間見白青間見此色之相剋者也凡相生者順相剋者逆然皆各有淺深則亦各有虛實是必察其澤夭而後決其成敗倘色夭不澤雖相生亦難調治色澤不夭雖相剋亦可救療要在合乎四時參以十法而明辨之毋致按圖索驥也可五色十法合參望診之法五色交錯已述於前十法合參當講於後蓋察其氣色分其生克固知其病之順逆症之從違矣由是參以浮沉之法則知其病之表裡參以清濁之法則知其病之陰陽參以微甚之法則知其病之虛實參以散摶之法則知其病之遠近參以澤夭之法則知其病之成敗而又合氣色言之如色赤者熱也赤而微者虛熱也赤而甚者實熱也微赤而浮者虛熱在表也微赤而沉者虛熱在裡也甚赤而浮者實熱在表也甚赤而沉者實熱在裡也若更合清濁而言則知其病之臟腑矣合散摶而言則知其病之輕重矣合澤夭而言則知其病之吉凶矣而凡五官六部與夫四時五色皆可錯綜參觀夫如是病之傳變不亦昭然乎雖然病情深奧望法精微間有隱於此而顯於彼者其病蓋又有遁情焉故必參伍於脈症錯綜於聲音察之至精問之至確然後決其病焉可也五色六部合參明堂望法五色既可互參六部亦當合論試舉陰陽相乘之診為例而凡五色六部仿此類推假如上部陽位也黑色陰色也黑色見於上部陰乘陽也下部陰位也赤色陽色也赤色見於下部陽乘陰也陰乘陽位為陰盛陽虛陽乘陰位為陽盛陰虛若陽色見於陽位為重陽陰色見於陰位為重陰中藏經曰熱發於上陽中之陽邪也熱發於下陰中之陽邪也寒起於上陽中之陰邪也寒起於下陰中之陰邪也脈經云陽乘陰者腰以下至足熱腰以上寒梔子豉湯吐以升之陰氣上爭心腹滿者死陰乘陽者腰以上至頭熱腰以下寒桂苓丸利以導之陽氣上爭得汗者生此相乘之旨也然病有表裡色有浮沉病有虛實色有淺深又當參伍十法以通其變焉舉一反三庶乎可矣氣色部位合參嘗謂診視明堂察其氣色分其部位則臟腑之病著症候之變明蓋部位者體也氣色者用也氣色見於臟部者病在臟見於腑部者病在腑見於枝節之部者病在枝節由是而觀有相應者焉有相乘者焉合五行而推之變在其中矣所謂相應者如青為風青見肺部者風中肺也青見心部者風中心也青見脾部者風中脾也青見腎部者風中腎也氣色部位皆當相應也所謂相乘者如青屬肝青見肺部者肝乘肺也青見心部者肝乘心也青見脾部者肝乘脾也青見腎部者肝乘腎也氣色部位皆可相乘也抑又聞之本部見本色淺淡為不及深濃為太過不得其平則皆病也假如鼻者脾之部黃者脾之色脾部見黃色則本經自病正邪也若見白色則子盜母氣虛邪也若見赤色則母助子氣實邪也若見青色則彼能克我賊邪也若見黑色則我能克彼微邪也太過者屬乎腑不及者屬乎臟臟腑相乘可由是而推矣第氣色有散摶則病症有輕重氣色有澤夭則病症有生死氣色有清濁則病症有陰陽浮沉之表裡不同微甚之虛實亦異合之四時參之四診變在其中矣吾故曰察其氣色分其部位則臟腑之病著症候之變明明堂如此面貌亦然面貌如此五官亦然後之學者仿此而推之可也氣色門戶合參望色之法部位既已參觀門戶亦當合論蓋明堂察色以入門戶為凶所謂門戶者闕庭肺門戶目肝門戶耳腎門戶口心脾門戶若有氣色入者皆死白色見沖眉上肺有病入闕庭夏死黃色見鼻上脾有病入口者春死青色見人中肝有病入目者秋死黑色見顴上腎有病入耳者六日死赤色見頤上心有病入口者冬死蓋五臟之色各入本臟門戶至被克之時為死期之日也然必其色沉夭則可謂云爾脈經曰病人首部耳目口鼻有黑氣起入於口者為入門戶其病主死是又以黑色為死氣以口為門戶也扁鵲華他察聲色要訣云肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死又凡病人及健人黑色若白色起入目及鼻口者死在三日中此二節皆有門戶吉凶之辨部位生克之分學者當參之十法合之四時庶可知其常變焉色病宜忌合參嘗謂色分五行則有生克色分陰陽則有宜忌蓋陽病而見陽色陰病而見陰色者宜也陽病而見陰色陰病而見陽色者忌也是故邪盛於表色宜浮清反見沉濁者忌也氣衰於裡色宜沉濁反見浮清者忌也身熱煩躁譫語妄言其色宜赤反見肢厥面青者忌也傷寒發汗若吐若下其色宜黃反見熱盛色赤者忌也失血脫津液色宜黃白反見面色鮮赤者忌也下痢便膿血色宜黃澀反見身熱面赤者忌也麻痘斑疹諸痛瘡瘍色皆宜赤反見青黑者忌也霍亂吐下諸嘔泄瀉色皆宜黃反見青黯者忌也由是而推一病有一病之宜忌一症有一症之宜忌凡色病相應者宜也相反者忌也反之微者難治反之甚者即死然猶有要焉則在察其澤夭以知成敗察其浮沉以知淺深察其摶散以知遠近視色上下以知病處積神於心以知往今故經曰相氣不微不知是非屬意弗去乃知新故此之謂也若夫聲音脈息之宜忌亦可以相應相反比例而推焉氣色聲音合參嘗謂形容氣色脈病聲音有時相應有時不相應非相應者可憑而不相應者不可憑也蓋有常焉有變焉因常可識其同因變可知其異故四診分觀則各有所當四診合論亦皆有可憑自其同者言之診不變治亦不變自其異者言之診無常治亦無常然而常變不離五行異同難逾四診參而伍之錯而綜之雖虛實不齊臟腑相勝而生克可推吉凶可斷焉試先以氣色聲音合而參之如肝色青其聲呼其音角心色赤其聲笑其音徵脾色黃其聲歌其音宮肺色白其聲哭其音商腎色黑其聲呻其音羽有是氣色有是聲音此為相應若見其氣色而不聞其聲音或聞其聲音而不見其氣色則五臟有盛衰五行有生克矣假令望見青之氣色而不聞角之聲音反得心之聲音者木生火也得腎之聲音者水生木也此相生之謂也得脾之聲音者木剋土也得肺之聲音者金剋木也此相剋之謂也五色五音皆可比例以相參也然氣色有微甚聲音有盛衰病症有虛實又當因診以通其變矣要之相生者順相剋者逆氣色克聲音者其死速聲音克氣色者其死遲氣色生聲音者其愈速聲音生氣色者其愈遲聲色相應而無過不及者平人也聲色相應而有過不及者病人也腑病多相生臟病多相剋太過者病在腑不及者病在臟臟腑相乘可由是而推也此氣色聲音合參之旨也至若病之定名症之定候其中又各有形容各有宜忌惟精於病症諸書熟於療治諸法識其常通其變胸有成竹目無全牛庶可迎刃而解矣氣色脈象合參既講聲音合參之旨當明脈象合參之診靈樞曰色脈形肉不得相失色青者其脈弦赤者其脈鉤黃者其脈代白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣夫所謂相勝相生者何也脈勝色色勝脈謂之相勝脈生色色生脈謂之相生五色五脈合之五行生剋可類推也假令色青其脈當弦今見青色而不得弦脈反得毛脈者脈勝色也得代脈者色勝脈也此相勝之謂也得石脈者脈生色也得鉤脈者色生脈也此相生之謂也脈鑑云色克脈者其死速脈克色者其死遲色生脈者其愈速脈生色者其愈遲然以余觀之五脈有微甚五色有淺深五病有虛實承製之理由是而窺剝復之機由是而測約而言之相勝者死相生者生相應而無過不及者平相應而有過不及者病臟病多相勝腑病多相生太過屬乎腑不及屬乎臟臟腑相乘可由是而推也此皆色脈合參之旨也氣色病症合參既講脈象合參之旨當明病症合參之診十六難曰假令得肝脈其外證善潔面青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也假令得心脈其外證面赤口乾善笑其內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也假令得脾脈其外證面黃善噫善思善味其內證當臍上有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也假令得肺脈其外證面白善嚏悲愁不樂欲哭其內證臍右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也假令得腎脈其外證面黑善恐善缺其內證臍下有動氣按之牢若痛其病逆氣小腹急痛泄如下重足脛寒而逆有是者腎也無是者非也此皆相參之法也由是而參之五官五官其應也參之五體五體其應也參之情志形容聲音臭味與夫毛髮皮肉經絡筋骨皆其應也蓋應者常也不應者變也知其常變則知其病症矣知其病症則知其生克矣假如色青而得腎證水生木也色青而得心證木生火也此相生之謂也又如色青而得肺證金剋木也色青而得脾證木剋土也此相剋之謂也凡相生者順相剋者逆色生病者為虛邪病生色者為實邪色克病者為賊邪病克色者為微邪色病相應者為正邪太過者病在腑不及者病在臟臟腑相乘可由是而推也然病症有三因氣色有十法又當因診以通其變焉時日支幹孤虛旺相亦可按法而合參矣由是而參之四時氣候有異也參之五方風土有殊也參之氣質強弱不齊也參之老少盛衰不等也參之形志苦樂不均也而況居移氣養移體合乎七情六淫以為病故見於形色發於聲音顯於症候應於脈息者遂千變萬化種種不同夫千變萬化種種不同而究不能出乎四診之範圍者何哉蓋天以陰陽五行化生萬物有諸內必形諸外隱於此必顯於彼月暈而風礎潤而雨一本而萬殊萬殊而一本也推廣望色大意竊謂脈之理微色之理愈微蓋有可以意會難以言傳者然病症不同氣色當異苟推而廣之擴而充之觸類而長之則雖難以形容者亦可以擬議焉如風色當青寒色當黑暑色當赤濕色當黃風令脈緩寒令脈急暑令脈虛濕令脈澀脈緩者尺之皮膚亦緩脈急者尺之皮膚亦急脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀脈大者尺之皮膚亦賁而起脈小者尺之皮膚亦減而少氣合色脈皮膚而參觀則風令脈緩者當色青而皮膚緩寒令脈急者當色黑而皮膚急暑令脈虛者當色赤而皮膚減而少氣濕令脈澀者當色黃而皮膚澀夫如是而風寒暑濕之色難以形容者不亦心解矣乎不寧唯是又如喜則氣散怒則氣逆思則氣結恐則氣下悲則氣消者亦可因其氣之變而擬議之也何也喜色油然以出怒色厲然以侮欲色嫗然以愈懼色薄然以下憂悲之色瞿然以靜也色者氣之華有諸內必形諸外也更進而推廣之如經言風寒中於人使人毫毛畢直皮膚閉而為熱夫皮膚既閉則其面色亦閉矣此可因經言皮膚閉而知其面色閉又可因病人面色閉而知其皮膚閉即可因面色閉皮膚閉而知其傷於寒也傷寒一日太陽受之太陽主表其證頭項痛腰脊強惡寒無汗夫惡寒無汗則其皮膚閉也可知皮膚閉則其面色閉也又可知此可因惡寒無汗而知其面色閉即可因面色閉而知其惡寒無汗又可因惡寒無汗而知其頭項痛腰脊強即可因頭項痛腰脊強惡寒無汗而知其太陽病傷於寒矣傷寒論云太陽病或已發熱或未發熱必惡寒體痛嘔逆斯時也未發熱者色或慘然而黑此外寒之色也已發熱者色或怫鬱而赤此表熱之色也若未得汗其色當閉若已得汗其色當開若將汗未汗則色當有閉而欲開之象矣匪直此也更可因其赤色之微甚而知其熱之輕重因其赤色之浮沉而知其熱之進退因其赤色之散摶而知其病之聚散因其赤色之澤夭而知其症之成敗而凡六部十法與夫四時五色莫不可推傷寒如此諸病亦然神而明之存乎其人難以筆楮形容矣主病條目大意色自內而達外已言其相應矣醫從外以知內當講夫主病焉夫相應之與主病其義一也其義一其用二如濕病色黃疸病色黃脾病色黃此內外相應之理也萬殊之所以一本也然脾病之黃不同於疸疸病之黃不同於濕此氣色主病之分也一本之所以萬殊也蓋相應者言其色之同主病者辨其氣之異夫色之同者擬議非難而氣之異者形容不易故今條目諸篇惟集古聖先賢所言者分録於後學者不以文害辭不以辭害意以意逆志是為得之否則如刻舟求劍膠柱鼓瑟矣至若病症不齊氣色各異可以象求難以言盡然能熟其提綱識其部位參伍診法錯綜病情雖四海之大百世之遠萬病之殊皆可因望而知變因變而知治大哉至哉範圍天地而不過曲成萬物而不遺非岐黃之至聖其孰能與於斯青色主病條目經云青黑為痛夫青者肝膽之色亦風木之色也雖為痛為風宜以部位診法參觀然後言其寒熱虛實如鼻頭色青者腹中痛也青黑甚者痛甚為攣也面青而唇口撮者疼痛方殷也鼻頭色青腹中痛若冷者死證也心痛色蒼蒼如死狀終日不得太息者肝心痛也頭痛頰青黃目眩暈不欲閉身體沉重兀兀欲吐者厥陰太陰為病痰厥頭痛也腹痛尿白爪甲白面多青喜熱飲或腹滿下利者寒痛也腹中作痛面色乍赤乍青乍白其痛時作時止時吐清水者蟲也色青脈至長而左右彈者有積氣在心下肢胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛也青而閉滯者痹痛也環目鼻而青者筋骨痠痛也目間青脈見者膽滯掣痛也面目青身痛如被杖咽喉痛五日可治七日不可治者陰毒之為病也煩躁如狂心腹攪痛頭旋欲吐面目青黑四肢冷逆者中砒霜之毒也中毒手足面皆青者時過救之恐不及也眥青者肝病也色微蒼嗌乾善悲善怒時憎女子多汗惡風目下色青者肝風也風門青者風病發搐也乍赤乍青者瘛瘲也面青吐沫卒不知人者癇也面青目反視手足搖者肝癇也癇發手足厥冷偃臥拘急面青吐沫聲音微小脈沉細者陰癇也病發似癲癇面色青黃者食芹得之蛟龍病也色蒼而爪枯者肝熱也耳前青者風也肝病色青手足拘急脅下苦滿或時眩冒其脈弦長者可治之證也面青心悶亂吐逆嘔沫脅痛頭眩重耳不聞人聲偏枯筋急曲拳而臥者肝風發也色青蒼白見於目下善悲指爪皆痛好轉筋者筋虛傷風為肝虛風也善怒嗌乾咳則脅下痛不能轉側腳下滿痛者筋實傷熱為肝實風也面目青黑卒然喑啞不聲踞坐不得四肢緩弱遺失便利者肝虛寒厲風所損也面青頰赤者瘧病寒熱也瘧病色蒼蒼然太息者肝瘧也先頭重頰痛顏青欲嘔身熱熱爭則腰痛不可以俯仰腹滿泄兩頷痛者脾熱病也小兒面青肉冷目陷乾嘔利下如水者夏月積冷暴涼加之而胃氣虛弱也小兒夜啼面色青白手足俱冷不欲吮乳曲腰不伸者脾寒也兩頰如青黛者中惡也卒然面青氣促者驚怖也小兒初生眉青臉赤口撮者臍風也小兒上氣氣逆面青喘嗽晝夜不息者風冷入肺也面青目瞪者氣喘也小兒面色時青時白時赤時黑者險證也青遮口角者必難治也目下胞青者胃寒也青而紫者惡血也瘀血上衝中心悶亂色青者死證也筋痹好悲思顏色蒼白四肢痿痹手足拘攣伸動縮急腹中轉痛者筋虛極也色青逆噫喜恍惚失氣狀似悲泣之後舌強咽喉干寒熱惡風不可動不嗜食苦眩善妄言者脈極也青黑慘暗者陽氣虛也青白形瘦如柴者元氣衰弱也青或兼白者陽虛陰勝也脈澀面色青者營氣不足也目下色青者或多憂驚或多色欲也面如塵垢者少陽病也咳嗽面青者肝乘肺也面青奪色者久病也色青脈弦而細兩脅下痛邪氣走心下足脛寒脅痛引小腹善轉筋爪甲枯黑春瘥秋劇者肝積之病男子積疝女子瘕淋也婦人面青者肝強脾弱或多怒少食或經脈不調也妊娠右目下青者女胎也妊娠目上青者生女又産難也妊娠溝洫青者雙生也無病而青色見於天庭者將病瘟疫也青如點染者晦氣時侵也山根年壽青者頻逢疾病也面青多言而熱者陰中之陽邪也面青多言而寒者陰中之陰邪也面青不言而寒者死陰之極也面青目黃者必難治也青白色如拇指大黶點見於顏頰上者肝病雖少愈必卒死也青黑色如拇指大黶點見於顏頰上者脾病雖少愈必卒死也青色橫於正面者行尸也脫色而面蒼蒼然者陰陽俱脫表裡相離也吐瀉目陷瞼青如磕傷者土敗木賊也青色繞耳者半年損壽也勞病青色自發際接印堂者死在六十日也勞病青色自發際接印堂至鼻者死在三十日也勞病青色自發際至鼻及人中者死在十七日也滿面色青者即死也耳聾百節皆縱目睘系絶色先青白乃死者少陽終也痰涎壅極吞吐不能厄逆不止腹脹色青黑者脾胃氣絶也眼閉不開急躁擾亂懊憹囊縮色青灰白者肝臟絶也面青但欲伏眠汗出如水不止者肝絶也四肢漐習唇吻反青者肝絶也面色青眼視人不直數淚出者肝絶也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青不澤毛折乃死者脈無胃氣金剋木也脾病色黃體青夫溲直視唇反張爪甲青飲食吐逆體重節痛四肢不舉其脈當浮大而緩今反弦急其色當黃而反青者此是木剋土為大逆十死不治是皆青色之目也赤色主病條目經云赤為熱夫赤者心與包絡小腸之色亦暑熱之色也然熱有表裡陰陽虛實之辨色有浮沉清濁微甚之分推而言之則四時六部亦各不同如額赤者上熱也頤赤者下熱也目痛鼻乾面赤者陽明病也面赤如醉者胃熱也兩頰微赤環目鼻而青者惡寒發熱也面色緣緣正赤者陽氣怫鬱在表也頰赤面青者寒熱往來也面赤多言而寒者陽中之陰邪也面赤多言而熱者陽中之陽邪也面赤而光者上熱下寒也面赤而鬱者下熱上寒也少陰病不利清穀手足厥逆脈微欲絶身反不惡寒其人面色赤者裡寒外熱也傷寒太陽病得之八九日如瘧狀發熱惡寒熱多寒少面色反有熱色者未欲解也面赤不退者邪盛病進也面赤漸退者邪解病退也脈浮而遲面赤而戰惕者六七日當汗出而解反發熱者瘥遲遲為無陽不能作汗其身必癢也多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者當治其氣衝也陽明病面合赤色不可攻之攻之必發熱色黃小便不利也先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗者心熱病也傷寒下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解所以然者其面戴陽下虛故也腸滿善喘咳面赤身熱喉咽中如核狀右寸陽實者手陽明大腸熱實也滿面色紅而氣盛者實熱也面色微赤或隱或見者虛熱也頰上赤青唇白者中風也面赤目上竄者風中太陽也色赤身熱自汗口渴脈虛者傷暑也面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治者陽毒之為病也小兒發熱面赤氣粗涕淚交流四末獨冷鼓栗惡寒者痘疹也發熱面赤眼中含淚指梢冷者痘也頭痛身熱咳嗽噴嚏呵缺頓悶鼻流清涕面腫腮赤者疹也面浮赤而眼光利射者狂病也面赤心下有熱短氣息微者心癇也癇發身熱自汗仰臥面赤牙關緊急啼叫不已口吐涎沫脈象洪數者陽癇也癇發吐吞急叫面色乍紅乍白悚惕不安如人將捕之狀者驚而致癇也面翕然赤漐熱有汗胸中煩熱洗洗惡寒翕翕發熱者肝中寒也小兒夜啼面赤唇紅身腹俱熱小便不利而煩躁者心熱也鼻紅燥者脾熱也兒生頭面肢體赤若塗丹者胎赤之病也咳嗽病面赤咽乾痰黃氣穢多帶稠黏頻頻咳嗽者熱嗽也太陽紅黑面如桃色者痢疾也口乾臉赤五心煩熱痢不止者中巴豆之毒也喜寐不知痛處面赤如醉下利膿血其下部孔稷稷然赤者䘌瘡也乍赤乍白乍黑者狐惑也顴如塗紅粉者腰痛也身熱足寒頸項強急惡寒時頭熱面赤獨頭搖卒口噤背反張者有汗不惡寒為柔痙無汗反惡寒為剛痙也年壽赤光者多生膿血也肝與腎脈並至其色蒼赤者當病毀傷也胃脈搏堅而長其色赤當病折髀其耎而散者當病食痹也癘風面紫發泡者病在肝也年壽目堂赤者疝氣也蘭臺庭畔赤如絲者遺精白濁也面色唇舌紫黯者中毒也顴上起紅點如火者男痔瘡女産厄也妊娠左目下赤者男胎也妊娠無病身更輕健其性多喜面色加紅左脈大者男胎也妊娠準頭赤者必産難也産後發熱面正赤喘而頭痛者中風也色赤焦絶善怒嚇多汗惡風甚則言不可快口色赤者心風也面赤翕然而熱悲傷嗔怒張目呼喚者心風發也脈沉而芤胸滿悸腹中熱上下無常處面赤咽乾心煩掌中熱甚則唾血身瘛瘲夏瘥冬劇者心積之病也心病色赤心痛短氣手掌煩熱或啼笑罵詈悲思愁慮身熱脈實大而數者可治之證也色赤而絡脈溢者心熱也面若塗朱者心火也氣滿胸中喘息面赤者氣海有餘之病也色赤脈喘而堅者有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之也勞倦即頭面赤而下重心中痛自煩發熱當臍跳其脈弦者此為心臟受傷所致也顴赤舌卷短者心病也赤甚者血病也午後色赤如妝者血虛也兩顴深赤者陰火上乘虛損勞疾也兩顴鮮赤如指如縷者陰虛也兩顴鮮赤或作或止者戴陽也兩頰炎赤者骨蒸勞疰也赤而索澤者氣虛也面赤目白憂恚思慮心氣內索面色反好者不過十日死也中風面赤如妝者不可治也面赤目白喘氣者火剋金也虛極面赤發喘痰多身熱趺腫溏泄脈緊不食者死證也人病面上忽見紅點者多死證也呼吸不相通五色不華者魂之損也蘢蔥華色者魂之至也耳目顴頰皆赤者死在五日中也熱病汗不出大顴發赤噦者死證也赤色出於顴大如拇指者病雖少愈必卒死大氣入於臟腑也肺病赤黑如拇指點黶見顏頰上者病雖少愈必卒死也神氣脫而昏沉不醒面赤黑者心絶也面赤如脂者心絶也面赤黑汗綴如珠者心絶也真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死者脈無胃氣水剋火也肺病身當有熱咳嗽短氣唾出膿血其脈當短澀今反浮大其色當白而反赤者此是火之剋金為大逆十死不治是皆赤色之目也稷稷然一作搜搜然黃色主病條目經云黃赤為風又云黃赤為熱夫黃者脾胃之色亦濕土之色也六部十法咸可交推五色四時皆當參究者也如一身盡疼發熱身色如熏黃者濕家之為病也面黃發熱身重體痛者濕在表也面黃潤而微者濕熱也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞也黃而昏滯者寒濕也身痛面色微黃齒垢黃爪甲上黃者黃疸也黃如梔子者黃疸也風濕相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃者谷疸也黃而昏黑者女勞酒疸也目青面黑心中如啖蒜齏狀大便正黑皮膚不仁其脈浮弱雖黑微黃者黑疸也疸病面紅黃口渴尿赤色亮身熱者陽黃也疸病口不渴面色暗黃身冷如冰者陰黃也疸病面黑黃作渴腹脹者難治也兒生遍體面目皆黃其色如金者苔黃也一身面目黃腫其脈沉小便不利者里水也唇黃者脾病也色萎黃者脾虛也鼻端色黃腠理開汗大泄體癢淫淫如鼠走者肌痹不已復感於邪內合於脾也風氣二池如黃土者脾傷也色薄微黃不嗜食身體怠惰四肢不欲動多汗惡風鼻上色黃者脾風也面黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨者脾風發也面黃腹大喜痢者脾癇也癇發麵黃腹滿吐利酸臭時時發搐者食癇也色黃而肉濡動者脾熱也面黃目赤季脅痛滿者脾熱也喜缺善嚏清涕出發熱色黃者中寒也黃而兼白者脾胃虛寒也黃而兼青者脾虛泄瀉也黃白無澤者脾肺氣虛也黃而枯癯者胃病虛熱也黃而色淡者胃病虛寒也腹脹食少精神倦怠面黃肌瘦者虛脹也黃而虛腫食少者虛極也色蒼黃腹筋起腹脹身皆大大與膚脹等者鼓脹也面黃大便黑喜忘如狂者內有蓄血也凡面黃者知其大便難也一黃一白如蟹爪路者食積也安臥色黃脈小而澀者不嗜食也小兒面黃腫者積證也面色青黃肌肉消瘦皮毛憔悴眼睛發䀽腹堅且大青筋暴露者疳病之證也面色乍黃乍白者疳積也面黃羸瘦毛髮作穗鼻癢者腦疳也脊骨如鋸拍背如鼓面黃瘦者脊疳也項內有核便利膿血羸瘦面黃發熱者無辜疳也腹脹筋青面色萎黃毛焦骨立好食泥土乳食不消身有瘡疥者脾疳也腹大頭細黃瘦者丁奚疳也身瘦面黃有瘡疥或瀉青黃白色或如垢膩如爛泥者疳瀉也身熱腹大昏睡面黃四肢無力鼻爛汁臭齒齦生瘡或下利黑血者小兒疳䘌腹中有蟲也面目青黃力乏身痛唇舌焦乾眉發脫落腹中切痛或如蟲齧或如蟲行者蟲疰也腹中塊起按之不見腫聚往來痛無休止五更心嘈牙關強硬嘔吐涎沫清水面色青黃飲食不生肌膚者蟲證也眼眶鼻下青黑面色萎黃臉有血絲幾條如蟹爪者亦蟲證也面黃唇白者虛寒泄瀉也色深黃者傷食吐利也脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫者陽明中風之證也面目悉黃有潮熱者胃熱也黃而目窠下微腫者痰飲也色黃脈大而虛者有積氣在腹中厥疝之證也色黃而赤腎脈搏堅而長者當病折腰其耎而散者當病少血至令不復也脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足䯒腫若水狀也色黃脈浮大而長心下纍纍如桃李腹滿嘔泄腸鳴四肢重足脛腫厥不能臥者脾積之證飢則見飽則減䐜氣與谷爭減也黃而枯燥者熱傷津液也黃而昏暗者津液耗也天庭黃赤者上焦熱也脈微面色黃者衛氣衰也寸口脈微而澀面色青黃寒栗咳逆唾腥吐涎沫者營衛俱微也鼻頭色黃者胸上有寒也鼻色慘黃者脾敗也鼻尖青黃者其人必淋也候其鼻準色黃者知其小便難也婦人面色如熏黃者經脈不調也肥人脈細色黃者胸上有寒也小兒初出腹面目繞鼻口左右悉黃閉目而啼聚口撮面口中乾燥四肢不能伸縮者其血沮敗肌肉不成血脈不斂也黃而膏潤者膿也黃而奪色者久病也久病色黃能食者內熱也傷寒太陽病汗下後復加燒針心下痞胸煩面色青黃膚瞤者難治色微黃手尺溫者易愈也鼻頭山根亮目眥黃者病有起色也脈和其人大煩目重瞼內際黃者病欲解也久病面轉黃者病欲愈也隱隱微黃者病向愈也諸病之色如雲徹散者病將愈易治也兩眥有黃色起者病方愈也承漿黃者不治之病也口角黃者脾絶之候也腎病黃黑色黶點如拇指應耳者必卒死也熱病喘咳唾血手足腹腫面黃振栗不言者肺先死魄與皮毛俱去也面黃目青手亂者邪風在胃木剋土也面無精光如土色者脾絶也面無精光若土色不受飲食者四日死也口目動作善驚妄言色黃其上下經盛不仁者陽明終也病者萎黃燥而不渴胸中煩實利不止者脾胃絶也真脾脈至弱而乍疏乍數色青黃不澤毛折乃死者脈無胃氣木剋土也腎病手足逆冷面赤目黃小便不禁骨節煩疼小腹結痛氣衝於心其脈當沉細而滑今反浮大其色當黑而反黃者此是土之剋水為大逆十死不治是皆黃色之目也白色主病條目經曰白為寒又曰少熱氣夫曰寒則知其陽衰矣曰少熱氣則知其氣少矣然白者肺與大腸之色亦燥金之色也雖為寒為虛當按四時五行辨之六部十法分之如面色㿠白者寒也面色青白鼻尖冷口氣不熱者亦寒也面色白甚者皮不仁也色皏然白時咳短氣多汗惡風者肺風也面白咳逆唾膿血上氣奄然而極者肺風發也色白而毛敗者肺病也厥心痛臥若從心間痛動作痛益甚色不變者肺心痛也肺病色白身體大寒無熱時時咳其脈微遲者可治之證也面白少澤者氣虛也面白色枯者血氣俱虛也脈形如循絲纍纍然其面白脫色者恐怖也脈浮而面色乍赤乍白者愧也色白夭然不澤其脈空虛者血脫也白而微青或臂多青脈者亦血脫也白而淡黃氣不足者失血也鼻頭色白者亡血也面白無血色者衄血也色白不澤氣不足者奪血奪氣脫津液也婦人面色黃白如雞皮者産後奪血也面無血色無寒熱脈沉弦者衄也面無血色無寒熱脈浮弱按之絶者下血也面無血色無寒熱煩咳者必吐血也男子面色薄主渴及亡血卒喘悸其脈浮者裡虛也㿠白淺淡者非脫血即心不生血也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑兼衄少腹滿者此為勞使之然也男子面無血色女子月經不通者心勞也淫而奪形身熱色夭然白及後下血衃血衃篤重者皆逆證也婦人産難面無顏色氣欲絶者血氣上搶心也婦人飲食減少面無光色腹中冷痛經候不調吸吸少氣無力者勞冷虛損也崩中面目脫色唇乾口燥者虛極乏氣也色白乾燥不澤飲食不為肌膚者脈熱極血氣脫也色白脈喘而浮上虛下實者有積氣在中喘而虛名曰肺痹寒熱得之醉而使內也飲食不為肌膚咳脫血色白不澤其脈空虛口唇見赤色者脈痹不已復感於邪內舍於心也多涕唾而面浮腫氣逆者咳也上氣面浮腫息肩者咳嗽氣逆也咳嗽病面色㿠白痰多清稀鼻流清涕者嗽寒也呼吸張口短氣者肺痿吐沫也而以手按之綿耎者氣虛有痰也面上有白點者蟲積也色白脈浮而毛按之辟易脅下時痛與背相引善忘少氣目瞑皮寒皮中時痛時癢如蝨緣針刺之狀冬愈夏劇者肺積之證也疳勞咳嗽骨蒸勞熱盜汗泄瀉腹硬如石面色如銀者不治之證也癇病面白色不變者病在足陽明太陰也面白少神手足逆冷者胃虛泄瀉也腸鳴腹脹時復疼痛所瀉澄徹清冷面色淡白四肢逆冷者中寒泄瀉也目上色白者腹疾也血少面無色驚悸盜汗夢遺甚則心痛咽腫者曲運神機心之勞也肺風之症視目下鼻上兩邊下行至口色白者尚可治若色黃者為肺已傷不可治也風懿病眼下及鼻人中左右白者可治一黑一赤吐沫者不可治也面白奪色者久病也聲嘶色脫者癰疽之逆證也色夭面脫者不治之證也白髮印堂黃髮口者亦不治之證也病人唇面青黑及五官起黑色白如擦殘汗粉之狀者雖不病亦主卒死也五色口邊繞循者死色也産婦口邊有白色者死在五七日也病人面㿠白直視息肩者死在一日中也小腸病痛劇有定處喜仰臥舒足若厄逆脈亂四肢逆冷白瘦無神忽然痛止者死徵也戴眼反折瘛瘲其色白絶汗出者太陽終也色灰白大急大喘氣脫失聲者肺腎絶也面白目黑者肺腎絶也真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死者脈無胃氣火剋金也肝病胸滿脅脹善恚怒叫呼身體有熱而復惡寒面白體滑其脈當弦強而急今反短澀其色當青而反白者此是金之剋木為大逆十死不治是皆白色之目也黑色主病條目經言黑為痛又言多血少氣蓋主痛者言其病多血少氣者言其常且黑者腎與三焦膀胱之色亦寒水之色也雖主痛主寒當按其部位審其病情推之以四時辨之以十法如顴與顏黑者腎病也色黑齒槁者腎熱也黑色淺淡者腎病水寒也黑甚者在脈則麻痹在筋則拘攣也色黑脈沉而急脊與腰相引痛小腹裡急咽腫傷爛口乾善忘目䀮䀮骨中寒者腎積之證飢則見飽則減也色黑脈堅而大者有積氣在小腹與陰腎痹之證也骨痹不已色黑耳鳴者復感於邪內舍於腎也面腫垢黑腰脊痛不能久立屈伸不利發墮齒槁腰背相引而痛甚則咳唾者骨極虛寒也面龐然浮腫脊痛不能正立其色炲隱曲不利多汗惡風肌上色黑者腎風也面黑手足不遂腰痛難以俯仰骨痹痛者腎風發也腎病色黑其氣虛弱吸吸少氣兩耳苦聾腰痛時時失精飲食減少膝以下清其脈沉滑而遲者可治之證也邪熱傷腎面黑黃耳色不應者亦尚可治也耳鳴面黑尿赤陰瘡者腎勞也面目乾黑精神不定不能獨臥目視不明頻頻下淚者肝勞也面色黧黑形瘦耳焦小便濁而有脂液者下消也鼻頭色微黑者有水氣也色黑目窠下微腫者水病也眼下如煙煤者痰飲也面色黧黑其人喘滿心下痞堅脈沉緊者膈間有支飲也面色慘然青黑者中寒也身冷反躁欲投井中唇青面黑渴欲飲水水入則吐大便自利脈或伏或沉細而疾者傷寒陰盛格陽也紫濁者時疫也慘黑帶紫者邪氣盛也鼻孔乾燥黑如煙煤者陽毒熱深也鼻出冷氣滑而黑者陰毒冷極也陰毒身重背強腹中絞痛咽喉不利心下堅強氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數身如被打者毒氣攻心五六日可治七日不可治也黑滯而驚恐不寐者客邪為害也黑如煙煤者中惡腹痛也耳前黑者疝痛也唇舌面色皆紫黯青腫者中毒也癇發麵黑直視不搖如尸狀者腎癇也血脈不榮顏色憔悴者心之經病也面見青黑斑點者神氣衰也形枯色灰者表虛也身瘦面晦暗如鉛色吐出瘀血色黑胃脘痛按之更痛而堅如咬如焚食時則痛食後痛止者癰在上口若食時不痛食後則痛者癰在下口也面黑顏黑者胃病也小腹滿額上黑足下熱者黑疸也額上黑微汗出手足中熱薄暮即發膀胱急小便自利者名曰女勞疸若腹如水狀則不治也額上昏黑麵黃者亦女勞疸也陰黃面色黧黑冷汗漐漐者死證也陽黃黃如煙燻目暗唇清者死證也凡黃家寸口近掌無脈口鼻冷黑者皆不可治也蒼黑而枯槁者血涸也血凝目下狀如豚肝者寒厥相遂為熱所壅也婦人羸瘦弱甚肢體煩痛面目瘀黑憂恚不樂者久虛不能食冷結臍下也面枯槁而略帶黑者血質有壞而然也妊娠色暗不開忽爾明者欲産也乍暗乍明者産難也婦人眼眶灰黑者崩中帶下也婦人面黑無顏色皮肉相連月經失度小腹弦急或絞痛至心兩脅腫脹食不生肌膚者當病崩中漏下且腐臭也腰痛而面色忽紅忽黑者心腎交爭難治之證也病人卒腫其面蒼黑者死證也面青黑暗瀉血者死證也病人面黑兩脅下滿不能自轉側者死證也腳氣衝心目額皆黑恍惚譫妄者水剋火命難全也腰腳腫小便不通氣上喘急目額皆黑左尺脈絶者腳氣入腎之死證也真心痛面黑四肢厥冷者旦發夕死夕發旦死也臍下忽大痛人中黑者死色也破傷風頭面青黑眼小目瞪身汗如油者邪入於臟難治之證也吐瀉之後四肢逆冷面黑氣喘冷汗自出外腎搐縮不省人事者元氣不接脫陽之證也面黑直視惡風者死證也色澤去面黑如黧者手少陰氣絶血先死也髦色不澤面黑如漆柴者手少陰氣絶血先死也脈不通血不流發不澤面黑如漆葉者血先死手少陰氣絶也赤黑色黯點見顏上若度年上者心病少愈必卒死也黑色出於庭大如拇指者必不病而卒死也色枯黑語聲不轉者心先死若天中等分墓色應之即死不治也病人黑氣出於天中下至年上顴上者死色也病人黑色出於額上髮際下直鼻脊及兩顴上者死在五日中也面黑目白者腎氣內傷也面黑目青者腎氣內傷病因留積八日當亡也黑色橫目三陽者死在半年間也面目帶黃黑連耳左右者年四旬以上百日死也額上黑如霧者死在百日內也臉上黑如霧者死在七日內也人中口吻黑繞者脾腎絶七日死也印堂黑暗耳門黑氣入口者不治之證也氣黑暗於耳前者亦不治也黑掩太陽者盧醫莫救也黑如濕灰者扁鵲不治也氣色搏聚凝滯者病將進難治也平人眼下青黑面色如灰塵者必病也眼角或青或黑者主大病也氣如煙霧者病欲纏身也黑滯漸退者病欲退也病愈而面色如煤不開者終不吉也面黑齒長而垢腹脹閉上下不通者少陰終也齒為暴枯面為正黑目中黃腰欲折自汗出如流水者腎絶之證四日死也腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通面黑皮毛焦者太陰終也病人及健人面忽如馬肝色望之如青近之如黑者肝腎絶也形體如煙燻直視搖頭者心絶也鼻如煙煤者肺絶也鼻孔黑燥無涕者肺絶也環口黧黑者腎絶也環口黧黑柔汗發黃者脾絶也耳輪焦黑者腎絶也真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死者脈無胃氣土剋水也心病煩悶少氣火熱熱上撞心嘔咳吐逆狂語汗出如珠身體厥冷其脈當浮今反沉濡而滑其色當赤而復黑者此是水之剋火為大逆十死不治是皆黑色之目也漆柴之柴千金作葉齒長而垢之垢千金作枯宜從之主病條目附識嘗謂氣色之於症候也有有定者有無定者主病條目有定之言也診法提綱無定之論也知主病之有定而不通乎法其失也膠知診法之無定而不究其病其失也泛且主病之言雖有定而合之於法則無定診法之論雖無定而合之於病則有定病同者其法同病異者其法異法者有物有則無體無方有定而無定無定而有定者也是故以千變萬化之法察千變萬化之病病無定法亦無定以千變萬化之法察千變萬化之證證有定法亦有定夫千變萬化之病形於外者固有無定之證而千變萬化之證由於中者實有有定之義故以病為有定而病則因人而無定以病為無定而病則因證而有定證也者病之著於形色發於聲音顯於症候應於脈息者也證定焉法斯定矣後之學者勿執有定之條目以測無定之病情當知無定之病情必見有定之氣色斯有病即有證有證即有定矣由是化而裁之推而行之則夫主病之條目增之可也刪之可也因而損益之亦無不可也雖然病之有色病之已形者也色之有象色之已見者也已形已見者可以言定未形未見者不可以言定況有已定而難於形容未定而難於擬議者是以提綱易詳而條目難盡也高明之家讀書而精究其意義臨症而熟察其情形其所得於觀感之間語言之外者抑又深於此矣神而明之存乎其人余著是書上卷推而言之故不厭其詳下卷約而言之故不嫌其簡然詳者當約之以求簡簡者當推之以求詳若讀一句只一句讀一篇只一篇則詳者近穿鑿簡者近缺略矣其自五官以下條目亦從簡者蓋提綱已挈其要領而條目之見於古書者皆醫所必讀醫所必閲缺之於此欲其求之於彼也至若所引聖經賢傳或斷章取義或互文見意以為辭不顛倒則義有不顯理不合參則意有不達原欲人因是明經非欲人以是荒經譬之作文題目拆開意義自見不比注解經傳句不可移字不可減且經傳具在或不以是為罪乎
