body:
  text: 敘豫先君石城翁諱坤堅字義彰讀書之暇嘗謂豫曰醫之為道至精至微明辨而行之則可以濟衆冒昧而施之適足以殺人爾學醫有年矣抑亦知其要否豫起而對曰昔軒轅氏定本草作內經盧扁雷桐莫不遵其規矩漢晉唐宋鮮能出其範圍今讀其遺文會其旨趣其法門有二一曰診一曰治望聞問切者診法也針灸藥石者治法也將欲治之必先診之非診無以知其病非診無以知其治也顧欲知其診之所當然究其診之所以然則凡天地古今之理南北高下之宜歲時氣候之殊晝夜陰晴之變以至賦稟強弱之不齊老少居養之各異莫不著見於四診焉豈但明乎血氣經絡皮肉筋骨與夫病之五臟六腑症之七情六淫也哉蓋著乎外者本乎內見於彼者由於此因端可以竟委溯流可以窮源是故寒熱補瀉之法因診而定標本先後之理因診而分七方十劑八法九針莫不因診而決用舍焉昔賢所謂明理者明此理也辨證者辨此證也理不明則證莫能辨證不辨則治莫能分故治病必須知診診病必須遵經豫先君曰入門矣未入於室也經文深奧診法精微既已識其大綱尤當考其細目慎之哉窮理盡性之事也格物致知之功也身家之所寄託生死之所相關也詩云如切如磋如琢如磨勉旃勉旃余退而志之恆以自警焉今著遵經有感於是因書篇首以告後人光緒元年三月上浣新安汪宏廣菴氏書於西安航埠
